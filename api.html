<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftChat API Server</title>
    <style>
        body {
            font-family: monospace;
            background: #0a0a0a;
            color: #0f0;
            padding: 20px;
        }
        .log {
            background: #1a1a1a;
            border: 1px solid #0f0;
            border-radius: 8px;
            padding: 20px;
            height: 80vh;
            overflow-y: auto;
        }
        .log-entry {
            border-bottom: 1px solid #333;
            padding: 8px;
            font-size: 12px;
        }
        h1 {
            color: #0f0;
            margin-bottom: 20px;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            background: #0f0;
            color: #0a0a0a;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h1>🚀 SwiftChat API Server <span class="status">ONLINE</span></h1>
    <div class="log" id="log"></div>

    <script>
        // ============================================
        //   API СЕРВЕР НА HTML
        //   Принимает POST запросы, возвращает JSON
        // ============================================
        
        // Хранилище данных (в памяти браузера + localStorage)
        let users = JSON.parse(localStorage.getItem('swiftchat_users') || '[]');
        let chats = JSON.parse(localStorage.getItem('swiftchat_chats') || '[]');
        let messages = JSON.parse(localStorage.getItem('swiftchat_messages') || '{}');
        let sessions = JSON.parse(localStorage.getItem('swiftchat_sessions') || '{}');
        
        let userIdCounter = users.length > 0 ? Math.max(...users.map(u => u.id), 0) + 1 : 1;
        let chatIdCounter = chats.length > 0 ? Math.max(...chats.map(c => c.id), 0) + 1 : 1;
        let msgIdCounter = 1;
        
        // Подсчет максимального ID сообщений
        for (let chatId in messages) {
            if (messages[chatId] && messages[chatId].length > 0) {
                let maxMsgId = Math.max(...messages[chatId].map(m => m.id));
                if (maxMsgId >= msgIdCounter) msgIdCounter = maxMsgId + 1;
            }
        }
        
        // Инициализация демо-данных
        if (users.length === 0) {
            users.push({
                id: userIdCounter++,
                email: "demo@swiftchat.com",
                username: "Демо Пользователь",
                password: "demo123",
                created_at: Date.now()
            });
            
            chats.push({
                id: chatIdCounter++,
                name: "Общий чат",
                type: "group",
                participants: [1],
                created_at: Date.now()
            });
            
            messages[1] = [{
                id: msgIdCounter++,
                text: "Добро пожаловать в SwiftChat! 👋",
                sender_id: 1,
                sender_name: "Система",
                created_at: Date.now(),
                read: false
            }];
            
            saveToLocalStorage();
        }
        
        function saveToLocalStorage() {
            localStorage.setItem('swiftchat_users', JSON.stringify(users));
            localStorage.setItem('swiftchat_chats', JSON.stringify(chats));
            localStorage.setItem('swiftchat_messages', JSON.stringify(messages));
            localStorage.setItem('swiftchat_sessions', JSON.stringify(sessions));
        }
        
        function logRequest(method, endpoint, data, response, status) {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `
                [${time}] ${method} ${endpoint} → ${status}
                <div style="margin-left: 20px; color: #888; font-size: 10px;">
                    📥 ${JSON.stringify(data || {}).substring(0, 100)}
                    📤 ${JSON.stringify(response || {}).substring(0, 100)}
                </div>
            `;
            logDiv.prepend(entry);
            while(logDiv.children.length > 50) logDiv.removeChild(logDiv.lastChild);
        }
        
        function jsonResponse(data, status = 200) {
            return { status: status, data: data };
        }
        
        // ========== API ENDPOINTS ==========
        
        async function handleRequest(method, endpoint, data, token) {
            console.log(`📡 ${method} ${endpoint}`, data);
            
            try {
                // РЕГИСТРАЦИЯ
                if (endpoint === "/api/auth/register" && method === "POST") {
                    const { email, username, password } = data;
                    if (users.find(u => u.email === email)) {
                        return jsonResponse({ error: "User already exists" }, 400);
                    }
                    const newUser = {
                        id: userIdCounter++,
                        email: email,
                        username: username,
                        password: password,
                        created_at: Date.now()
                    };
                    users.push(newUser);
                    
                    // Добавляем в общий чат
                    const generalChat = chats.find(c => c.name === "Общий чат");
                    if (generalChat && !generalChat.participants.includes(newUser.id)) {
                        generalChat.participants.push(newUser.id);
                    }
                    
                    saveToLocalStorage();
                    logRequest(method, endpoint, data, { success: true }, 200);
                    return jsonResponse({
                        success: true,
                        user: { id: newUser.id, email: newUser.email, username: newUser.username }
                    });
                }
                
                // ВХОД
                if (endpoint === "/api/auth/login" && method === "POST") {
                    const { email, password } = data;
                    const user = users.find(u => u.email === email && u.password === password);
                    if (!user) {
                        return jsonResponse({ error: "Invalid credentials" }, 401);
                    }
                    const newToken = btoa(user.id + ":" + Date.now() + ":" + Math.random());
                    sessions[newToken] = { user_id: user.id, expires: Date.now() + 604800000 };
                    saveToLocalStorage();
                    logRequest(method, endpoint, data, { token: "***" }, 200);
                    return jsonResponse({
                        access_token: newToken,
                        user: { id: user.id, email: user.email, username: user.username }
                    });
                }
                
                // ПОЛУЧИТЬ ТЕКУЩЕГО ПОЛЬЗОВАТЕЛЯ
                if (endpoint === "/api/users/me" && method === "GET") {
                    const session = sessions[token];
                    if (!session) return jsonResponse({ error: "Unauthorized" }, 401);
                    const user = users.find(u => u.id === session.user_id);
                    if (!user) return jsonResponse({ error: "User not found" }, 404);
                    return jsonResponse({ id: user.id, email: user.email, username: user.username });
                }
                
                // ПОЛУЧИТЬ ЧАТЫ
                if (endpoint === "/api/chats" && method === "GET") {
                    const session = sessions[token];
                    if (!session) return jsonResponse({ error: "Unauthorized" }, 401);
                    
                    const userChats = chats.filter(chat => chat.participants.includes(session.user_id));
                    const result = userChats.map(chat => {
                        const chatMessages = messages[chat.id] || [];
                        const lastMsg = chatMessages[chatMessages.length - 1];
                        const unread = chatMessages.filter(m => m.sender_id !== session.user_id && !m.read).length;
                        
                        return {
                            id: chat.id,
                            name: chat.name,
                            type: chat.type,
                            participants: chat.participants.map(pid => {
                                const p = users.find(u => u.id === pid);
                                return { id: p?.id, username: p?.username };
                            }),
                            last_message: lastMsg ? { text: lastMsg.text, sender_name: lastMsg.sender_name } : null,
                            unread_count: unread
                        };
                    });
                    return jsonResponse(result);
                }
                
                // СОЗДАТЬ ЧАТ
                if (endpoint === "/api/chats" && method === "POST") {
                    const session = sessions[token];
                    if (!session) return jsonResponse({ error: "Unauthorized" }, 401);
                    
                    const { name, user_ids } = data;
                    const allUsers = [...new Set([session.user_id, ...(user_ids || [])])];
                    const newChat = {
                        id: chatIdCounter++,
                        name: name || `Чат ${chatIdCounter}`,
                        type: allUsers.length === 2 ? "private" : "group",
                        participants: allUsers,
                        created_at: Date.now()
                    };
                    chats.push(newChat);
                    messages[newChat.id] = [];
                    saveToLocalStorage();
                    return jsonResponse({ id: newChat.id, name: newChat.name, type: newChat.type });
                }
                
                // ПОЛУЧИТЬ СООБЩЕНИЯ
                if (endpoint.match(/^\/api\/messages\/\d+$/) && method === "GET") {
                    const session = sessions[token];
                    if (!session) return jsonResponse({ error: "Unauthorized" }, 401);
                    
                    const chatId = parseInt(endpoint.split("/")[3]);
                    const chat = chats.find(c => c.id === chatId);
                    if (!chat || !chat.participants.includes(session.user_id)) {
                        return jsonResponse({ error: "Not a member" }, 403);
                    }
                    
                    const chatMessages = messages[chatId] || [];
                    chatMessages.forEach(msg => {
                        if (msg.sender_id !== session.user_id && !msg.read) {
                            msg.read = true;
                        }
                    });
                    saveToLocalStorage();
                    return jsonResponse(chatMessages);
                }
                
                // ОТПРАВИТЬ СООБЩЕНИЕ
                if (endpoint === "/api/messages" && method === "POST") {
                    const session = sessions[token];
                    if (!session) return jsonResponse({ error: "Unauthorized" }, 401);
                    
                    const { chat_id, text } = data;
                    const chat = chats.find(c => c.id === chat_id);
                    if (!chat || !chat.participants.includes(session.user_id)) {
                        return jsonResponse({ error: "Not a member" }, 403);
                    }
                    
                    const user = users.find(u => u.id === session.user_id);
                    const newMsg = {
                        id: msgIdCounter++,
                        text: text,
                        sender_id: session.user_id,
                        sender_name: user.username,
                        created_at: Date.now(),
                        read: false
                    };
                    
                    if (!messages[chat_id]) messages[chat_id] = [];
                    messages[chat_id].push(newMsg);
                    saveToLocalStorage();
                    return jsonResponse(newMsg);
                }
                
                // ПОИСК ПОЛЬЗОВАТЕЛЕЙ
                if (endpoint.startsWith("/api/users/search") && method === "GET") {
                    const session = sessions[token];
                    if (!session) return jsonResponse({ error: "Unauthorized" }, 401);
                    
                    let query = "";
                    if (endpoint.includes("?q=")) {
                        query = endpoint.split("?q=")[1];
                    }
                    const results = users.filter(u => 
                        u.id !== session.user_id && 
                        (u.email.includes(query) || u.username.includes(query))
                    ).map(u => ({ id: u.id, email: u.email, username: u.username }));
                    return jsonResponse(results);
                }
                
                return jsonResponse({ error: "Endpoint not found: " + endpoint }, 404);
                
            } catch (error) {
                console.error("API Error:", error);
                logRequest(method, endpoint, data, { error: error.message }, 500);
                return jsonResponse({ error: error.message }, 500);
            }
        }
        
        // ========== ОБРАБОТЧИК POST ЗАПРОСОВ ==========
        
        // Функция для обработки запросов из Python
        window.processRequest = async function(requestData) {
            const { method, endpoint, data, token } = requestData;
            const result = await handleRequest(method, endpoint, data, token);
            logRequest(method, endpoint, data, result.data, result.status);
            return result;
        };
        
        // Для fetch запросов (если нужно)
        window.handleAPIRequest = async function(requestData) {
            return await window.processRequest(requestData);
        };
        
        // Выводим информацию в консоль
        console.log("=".repeat(50));
        console.log("✅ SwiftChat API Server запущен!");
        console.log(`📁 Пользователей: ${users.length}, Чатов: ${chats.length}`);
        console.log("📡 API доступен по адресу: " + window.location.href);
        console.log("");
        console.log("🔧 Пример запроса из Python:");
        console.log(`
import requests
import json

url = "https://vadim5832.github.io/Game/api.html"
payload = {
    "method": "POST",
    "endpoint": "/api/auth/login",
    "data": {"email": "demo@swiftchat.com", "password": "demo123"},
    "token": None
}
response = requests.post(url, json=payload)
print(response.json())
        `);
        console.log("=".repeat(50));
        
        // Обновляем статус
        const statusSpan = document.querySelector('.status');
        if (statusSpan) {
            statusSpan.textContent = "ONLINE";
            statusSpan.style.background = "#0f0";
        }
    </script>
</body>
</html>
