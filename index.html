<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SwiftChat | Мессенджер с отправкой с твоей почты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .app-container {
            width: 100%;
            max-width: 1400px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
        }

        .chats-sidebar {
            width: 320px;
            background: rgba(15, 25, 35, 0.95);
            border-right: 1px solid rgba(46, 204, 113, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .user-info {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid #2ecc7133;
        }

        .user-email {
            color: #2ecc71;
            font-weight: 600;
            font-size: 0.85rem;
            word-break: break-all;
        }

        .user-name {
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 5px;
        }

        .logout-btn {
            margin-top: 12px;
            background: rgba(231, 76, 60, 0.8);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #e74c3c;
        }

        .chats-header {
            padding: 16px 20px;
            color: white;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.2);
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-item {
            padding: 14px 16px;
            margin-bottom: 6px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: rgba(46, 204, 113, 0.15);
            border-color: #2ecc7144;
        }

        .chat-item.active {
            background: rgba(46, 204, 113, 0.25);
            border-color: #2ecc71;
        }

        .chat-name {
            color: white;
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .chat-preview {
            color: #8aaec0;
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(10, 20, 28, 0.8);
        }

        .chat-header {
            padding: 18px 24px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid #2ecc7133;
        }

        .current-chat-name {
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.2s ease;
        }

        .message.outgoing {
            align-self: flex-end;
        }

        .message.incoming {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .outgoing .message-bubble {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: #0a1a22;
            border-bottom-right-radius: 4px;
        }

        .incoming .message-bubble {
            background: #1e3a4a;
            color: #eef4ff;
            border-bottom-left-radius: 4px;
            border: 1px solid #2ecc7144;
        }

        .message-meta {
            font-size: 0.65rem;
            margin-top: 4px;
            color: #7e95a3;
            display: flex;
            gap: 12px;
        }

        .outgoing .message-meta {
            justify-content: flex-end;
        }

        .input-area {
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid #2ecc7133;
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            background: #0a1a24;
            border: 1px solid #2ecc7144;
            padding: 12px 18px;
            border-radius: 40px;
            font-size: 0.95rem;
            color: white;
            outline: none;
        }

        .input-area input:focus {
            border-color: #2ecc71;
        }

        .input-area button {
            background: #2ecc71;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .input-area button:hover {
            background: #27ae60;
            transform: scale(0.98);
        }

        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .auth-modal {
            background: #1e2f3c;
            border-radius: 32px;
            padding: 32px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid #2ecc7166;
        }

        .auth-modal h2 {
            color: white;
            margin-bottom: 24px;
            text-align: center;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .auth-tab.active {
            background: #2ecc71;
            color: #0a1a22;
        }

        .auth-input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            background: #0a1a24;
            border: 1px solid #2ecc7144;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .auth-input:focus {
            border-color: #2ecc71;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #2ecc71;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.8rem;
            margin-top: 8px;
            text-align: center;
        }

        .success-message {
            color: #2ecc71;
            font-size: 0.8rem;
            text-align: center;
        }

        .settings-panel {
            background: #0a1a24;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #2ecc7144;
        }

        .settings-panel h3 {
            color: #2ecc71;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .settings-hint {
            font-size: 0.7rem;
            color: #7e95a3;
            margin-top: 8px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .messages-area::-webkit-scrollbar {
            width: 5px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #1e2f3c;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #2ecc71;
            border-radius: 10px;
        }
    </style>
    <!-- Подключаем SMTP.js для отправки с твоей почты -->
    <script src="https://smtpjs.com/v3/smtp.js"></script>
</head>

<body>
    <div id="app"></div>

    <script>
        // ============================================
        //   МЕССЕНДЖЕР С ОТПРАВКОЙ ПИСЕМ С ТВОЕЙ ПОЧТЫ
        //   через SMTP.js (Gmail)
        // ============================================
        
        // ========== НАСТРОЙКИ ТВОЕЙ ПОЧТЫ ==========
        // ⚠️ ВСТАВЬ СВОИ ДАННЫЕ ЗДЕСЬ:
        const YOUR_EMAIL ="provad5832@gmail.com";     // Твой Gmail
        const YOUR_PASSWORD = "xalp xdzm yuty hjqj";      // Пароль приложения Gmail
        // ============================================
        
        // Инструкция по получению пароля приложения:
        // 1. Включи двухфакторную аутентификацию в Gmail
        // 2. Зайди на https://myaccount.google.com/apppasswords
        // 3. Выбери "Другое", введи "SwiftChat" и скопируй 16-значный пароль
        
        // --- Хранилище данных (localStorage) ---
        let users = [];
        let chats = [];
        let messages = {};
        let currentSession = {
            user: null,
            loggedIn: false,
            currentChatId: null
        };
        
        // Временные коды подтверждения
        let pendingCodes = {};
        
        // Загрузка данных из localStorage
        function loadData() {
            const storedUsers = localStorage.getItem('messenger_users');
            const storedChats = localStorage.getItem('messenger_chats');
            const storedMessages = localStorage.getItem('messenger_messages');
            const storedCodes = localStorage.getItem('messenger_codes');
            
            if (storedUsers) users = JSON.parse(storedUsers);
            if (storedChats) chats = JSON.parse(storedChats);
            if (storedMessages) messages = JSON.parse(storedMessages);
            if (storedCodes) pendingCodes = JSON.parse(storedCodes);
            
            // Если нет данных, создаем дефолтные
            if (users.length === 0) {
                users = [
                    { email: "demo@swiftchat.com", password: "demo123", name: "Демо Пользователь", verified: true }
                ];
                saveUsers();
            }
            
            if (chats.length === 0) {
                chats = [
                    { id: "general", name: "🌟 Общий чат", participants: [], lastMessage: "Добро пожаловать!" },
                    { id: "random", name: "🎲 Random Talks", participants: [], lastMessage: "Присоединяйтесь!" },
                    { id: "tech", name: "💻 Техподдержка", participants: [], lastMessage: "Чем помочь?" }
                ];
                saveChats();
            }
            
            if (Object.keys(messages).length === 0) {
                messages = {
                    general: [
                        { id: "1", text: "Добро пожаловать в SwiftChat! 👋", sender: "system", senderName: "Система", timestamp: Date.now() }
                    ],
                    random: [],
                    tech: []
                };
                saveMessages();
            }
        }
        
        function saveUsers() { localStorage.setItem('messenger_users', JSON.stringify(users)); }
        function saveChats() { localStorage.setItem('messenger_chats', JSON.stringify(chats)); }
        function saveMessages() { localStorage.setItem('messenger_messages', JSON.stringify(messages)); }
        function saveCodes() { localStorage.setItem('messenger_codes', JSON.stringify(pendingCodes)); }
        
        // --- Отправка письма через твой Gmail (SMTP.js) ---
        async function sendEmailWithSMTP(toEmail, code) {
            return new Promise((resolve) => {
                if (YOUR_EMAIL === "your-email@gmail.com" || YOUR_PASSWORD === "your-app-password") {
                    console.log(`⚠️ Настрой почту в коде! Строки 250-251`);
                    console.log(`📧 Код для ${toEmail}: ${code}`);
                    resolve({ success: false, message: "Настрой свою почту в коде (строки 250-251). Код в консоли." });
                    return;
                }
                
                Email.send({
                    Host: "smtp.gmail.com",
                    Username: YOUR_EMAIL,
                    Password: YOUR_PASSWORD,
                    To: toEmail,
                    From: YOUR_EMAIL,
                    Subject: "🔐 Код подтверждения - SwiftChat",
                    Body: `
                        <div style="font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; padding: 20px; background: #1e2f3c; border-radius: 16px;">
                            <h2 style="color: #2ecc71;">SwiftChat</h2>
                            <p style="color: white;">Ваш код подтверждения:</p>
                            <div style="font-size: 32px; font-weight: bold; color: #2ecc71; background: #0a1a24; padding: 20px; text-align: center; border-radius: 12px; letter-spacing: 5px;">
                                ${code}
                            </div>
                            <p style="color: #8aaec0; margin-top: 20px;">Код действителен 5 минут.</p>
                            <hr style="border-color: #2ecc7133;">
                            <p style="color: #7e95a3; font-size: 12px;">Если вы не запрашивали код, проигнорируйте это письмо.</p>
                        </div>
                    `
                }).then((message) => {
                    console.log("Email send result:", message);
                    if (message === "OK") {
                        resolve({ success: true, message: "Код отправлен на почту!" });
                    } else {
                        resolve({ success: false, message: "Ошибка отправки. Проверь пароль приложения. Код в консоли." });
                    }
                }).catch((error) => {
                    console.error("SMTP Error:", error);
                    resolve({ success: false, message: "Ошибка: " + error.message + ". Код в консоли." });
                });
            });
        }
        
        // Генерация и отправка кода
        async function sendVerificationCode(email) {
            // Генерируем 6-значный код
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            
            // Сохраняем код с временем жизни 5 минут
            pendingCodes[email] = {
                code: code,
                expires: Date.now() + 300000
            };
            saveCodes();
            
            // Отправляем через SMTP с твоей почты
            const result = await sendEmailWithSMTP(email, code);
            
            // Всегда показываем код в консоли для отладки
            console.log(`🔐 Код для ${email}: ${code}`);
            
            return result;
        }
        
        // Проверка кода
        function verifyCode(email, enteredCode) {
            const pending = pendingCodes[email];
            
            if (!pending) {
                return { success: false, message: 'Код не запрошен. Нажмите "Получить код"' };
            }
            
            if (Date.now() > pending.expires) {
                delete pendingCodes[email];
                saveCodes();
                return { success: false, message: 'Код истек. Запросите новый' };
            }
            
            if (pending.code === enteredCode) {
                delete pendingCodes[email];
                saveCodes();
                return { success: true };
            }
            
            return { success: false, message: 'Неверный код' };
        }
        
        // --- Регистрация и вход ---
        function register(email, password, name) {
            if (users.find(u => u.email === email)) {
                return { success: false, message: 'Пользователь с таким email уже существует' };
            }
            users.push({ email, password, name, verified: true });
            saveUsers();
            return { success: true };
        }
        
        function login(email, password) {
            const user = users.find(u => u.email === email && u.password === password);
            if (user) {
                return { success: true, user };
            }
            return { success: false, message: 'Неверный email или пароль' };
        }
        
        // --- Сообщения и чаты ---
        function addMessage(chatId, text, senderEmail, senderName) {
            if (!messages[chatId]) messages[chatId] = [];
            const newMsg = {
                id: Date.now().toString(),
                text: text.trim(),
                sender: senderEmail,
                senderName: senderName,
                timestamp: Date.now()
            };
            messages[chatId].push(newMsg);
            
            const chat = chats.find(c => c.id === chatId);
            if (chat) chat.lastMessage = text.substring(0, 50);
            
            saveMessages();
            saveChats();
            return newMsg;
        }
        
        function getChatMessages(chatId) {
            return messages[chatId] ? [...messages[chatId]].sort((a,b) => a.timestamp - b.timestamp) : [];
        }
        
        function addUserToChats(email) {
            chats.forEach(chat => {
                if (!chat.participants.includes(email)) {
                    chat.participants.push(email);
                }
            });
            saveChats();
        }
        
        // --- Рендеринг ---
        function renderApp() {
            const app = document.getElementById('app');
            if (!currentSession.loggedIn || !currentSession.user) {
                app.innerHTML = renderAuth();
                attachAuthEvents();
            } else {
                app.innerHTML = renderMessenger();
                attachMessengerEvents();
                setTimeout(() => {
                    const area = document.getElementById('messagesArea');
                    if (area) area.scrollTop = area.scrollHeight;
                }, 50);
            }
        }
        
        function renderAuth() {
            const isConfigured = YOUR_EMAIL !== "your-email@gmail.com" && YOUR_PASSWORD !== "your-app-password";
            return `
                <div class="auth-overlay">
                    <div class="auth-modal">
                        <h2>📧 SwiftChat</h2>
                        
                        <div class="settings-panel">
                            <h3>⚙️ Настройка твоей почты для отправки кодов</h3>
                            <input type="email" id="userEmailSetting" class="auth-input" placeholder="Твой Gmail (например, you@gmail.com)" value="${YOUR_EMAIL !== 'your-email@gmail.com' ? YOUR_EMAIL : ''}">
                            <input type="password" id="userPasswordSetting" class="auth-input" placeholder="Пароль приложения Gmail" value="${YOUR_PASSWORD !== 'your-app-password' ? '••••••••' : ''}">
                            <button id="saveEmailSettings" class="auth-btn" style="background: #3498db;">💾 Сохранить настройки почты</button>
                            <div class="settings-hint">
                                🔑 <strong>Как получить пароль приложения:</strong><br>
                                1. Включи двухфакторную аутентификацию в Gmail<br>
                                2. Перейди на <a href="https://myaccount.google.com/apppasswords" target="_blank" style="color:#2ecc71;">myaccount.google.com/apppasswords</a><br>
                                3. Выбери "Другое" → введи "SwiftChat" → скопируй 16-значный пароль
                            </div>
                        </div>
                        
                        <div class="auth-tabs">
                            <button class="auth-tab active" data-tab="login">Вход</button>
                            <button class="auth-tab" data-tab="register">Регистрация</button>
                        </div>
                        
                        <div id="loginForm">
                            <input type="email" id="loginEmail" class="auth-input" placeholder="Email" autocomplete="email">
                            <input type="password" id="loginPassword" class="auth-input" placeholder="Пароль">
                            <button id="loginBtn" class="auth-btn">🔓 Войти</button>
                        </div>
                        
                        <div id="registerForm" style="display: none;">
                            <input type="email" id="regEmail" class="auth-input" placeholder="Email">
                            <input type="text" id="regName" class="auth-input" placeholder="Ваше имя">
                            <input type="password" id="regPassword" class="auth-input" placeholder="Пароль">
                            <input type="password" id="regPasswordConfirm" class="auth-input" placeholder="Подтвердите пароль">
                            <button id="sendCodeBtn" class="auth-btn">📩 Получить код подтверждения</button>
                            <div id="codeSection" style="display: none; margin-top: 16px;">
                                <input type="text" id="verifyCode" class="auth-input" placeholder="Введите код из письма">
                                <button id="verifyCodeBtn" class="auth-btn">✅ Подтвердить и зарегистрироваться</button>
                            </div>
                        </div>
                        
                        <div id="authMessage" class="error-message"></div>
                        <div style="margin-top: 20px; font-size: 0.7rem; color: #7e95a3; text-align: center;">
                            💡 <strong>Демо-вход:</strong> demo@swiftchat.com / demo123<br>
                            📧 <strong>После настройки почты</strong> — код будет приходить на email!
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderMessenger() {
            const user = currentSession.user;
            const userChats = chats.filter(chat => chat.participants.includes(user.email));
            const currentChat = chats.find(c => c.id === currentSession.currentChatId) || userChats[0];
            const currentMessages = currentChat ? getChatMessages(currentChat.id) : [];
            
            return `
                <div class="app-container">
                    <div class="chats-sidebar">
                        <div class="user-info">
                            <div class="user-email">${escapeHtml(user.email)}</div>
                            <div class="user-name">👤 ${escapeHtml(user.name)}</div>
                            <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
                        </div>
                        <div class="chats-header">💬 Мои чаты</div>
                        <div class="chats-list" id="chatsList">
                            ${userChats.map(chat => `
                                <div class="chat-item ${chat.id === currentSession.currentChatId ? 'active' : ''}" data-chat-id="${chat.id}">
                                    <div class="chat-name">
                                        <span>${escapeHtml(chat.name)}</span>
                                    </div>
                                    <div class="chat-preview">${escapeHtml(chat.lastMessage || 'Нет сообщений')}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="chat-main">
                        <div class="chat-header">
                            <div class="current-chat-name">${currentChat ? escapeHtml(currentChat.name) : 'Выберите чат'}</div>
                        </div>
                        <div class="messages-area" id="messagesArea">
                            ${currentMessages.map(msg => `
                                <div class="message ${msg.sender === user.email ? 'outgoing' : 'incoming'}">
                                    <div class="message-bubble">${escapeHtml(msg.text)}</div>
                                    <div class="message-meta">
                                        <span>${msg.sender === user.email ? 'Вы' : escapeHtml(msg.senderName)}</span>
                                        <span>${new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                    </div>
                                </div>
                            `).join('')}
                            ${currentMessages.length === 0 ? '<div style="text-align:center; color:#7e95a3; padding:40px;">💬 Напишите первое сообщение!</div>' : ''}
                        </div>
                        <div class="input-area">
                            <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
                            <button id="sendMsgBtn">📨 Отправить</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        let pendingRegistration = null;
        
        function attachAuthEvents() {
            // Сохранение настроек почты
            const saveBtn = document.getElementById('saveEmailSettings');
            if (saveBtn) {
                saveBtn.onclick = () => {
                    const email = document.getElementById('userEmailSetting').value.trim();
                    const password = document.getElementById('userPasswordSetting').value;
                    if (email && password) {
                        // Сохраняем в localStorage
                        localStorage.setItem('messenger_smtp_email', email);
                        localStorage.setItem('messenger_smtp_password', password);
                        // Обновляем переменные
                        window.YOUR_EMAIL = email;
                        window.YOUR_PASSWORD = password;
                        showAuthMessage('Настройки сохранены! Теперь коды будут приходить на почту.', 'success');
                    } else {
                        showAuthMessage('Заполни оба поля', 'error');
                    }
                };
            }
            
            // Загружаем сохраненные настройки
            const savedEmail = localStorage.getItem('messenger_smtp_email');
            const savedPassword = localStorage.getItem('messenger_smtp_password');
            if (savedEmail && savedPassword) {
                window.YOUR_EMAIL = savedEmail;
                window.YOUR_PASSWORD = savedPassword;
                const emailInput = document.getElementById('userEmailSetting');
                const passInput = document.getElementById('userPasswordSetting');
                if (emailInput) emailInput.value = savedEmail;
                if (passInput) passInput.value = savedPassword;
            }
            
            // Переключение табов
            document.querySelectorAll('.auth-tab').forEach(tab => {
                tab.onclick = () => {
                    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    const isLogin = tab.dataset.tab === 'login';
                    document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
                    document.getElementById('registerForm').style.display = isLogin ? 'none' : 'block';
                    document.getElementById('authMessage').textContent = '';
                };
            });
            
            // Логин
            document.getElementById('loginBtn').onclick = () => {
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value;
                const result = login(email, password);
                if (result.success) {
                    currentSession.user = result.user;
                    currentSession.loggedIn = true;
                    currentSession.currentChatId = chats[0]?.id;
                    addUserToChats(email);
                    renderApp();
                } else {
                    showAuthMessage(result.message, 'error');
                }
            };
            
            // Отправить код для регистрации
            document.getElementById('sendCodeBtn').onclick = async () => {
                const email = document.getElementById('regEmail').value.trim();
                const name = document.getElementById('regName').value.trim();
                const password = document.getElementById('regPassword').value;
                const confirm = document.getElementById('regPasswordConfirm').value;
                
                if (!email || !name || !password) {
                    showAuthMessage('Заполните все поля', 'error');
                    return;
                }
                if (password !== confirm) {
                    showAuthMessage('Пароли не совпадают', 'error');
                    return;
                }
                if (users.find(u => u.email === email)) {
                    showAuthMessage('Пользователь уже существует', 'error');
                    return;
                }
                
                pendingRegistration = { email, name, password };
                
                showAuthMessage('Отправка кода...', 'success');
                const result = await sendVerificationCode(email);
                
                if (result.success) {
                    document.getElementById('codeSection').style.display = 'block';
                    showAuthMessage(result.message, 'success');
                } else {
                    document.getElementById('codeSection').style.display = 'block';
                    showAuthMessage(result.message + ' Код в консоли (F12)', 'error');
                }
            };
            
            // Подтвердить код и зарегистрироваться
            document.getElementById('verifyCodeBtn').onclick = () => {
                if (!pendingRegistration) {
                    showAuthMessage('Сначала запросите код', 'error');
                    return;
                }
                const code = document.getElementById('verifyCode').value.trim();
                const result = verifyCode(pendingRegistration.email, code);
                
                if (result.success) {
                    const regResult = register(pendingRegistration.email, pendingRegistration.password, pendingRegistration.name);
                    if (regResult.success) {
                        showAuthMessage('Регистрация успешна! Теперь войдите.', 'success');
                        document.querySelector('.auth-tab[data-tab="login"]').click();
                        pendingRegistration = null;
                        document.getElementById('codeSection').style.display = 'none';
                        document.getElementById('verifyCode').value = '';
                    } else {
                        showAuthMessage(regResult.message, 'error');
                    }
                } else {
                    showAuthMessage(result.message, 'error');
                }
            };
        }
        
        function showAuthMessage(msg, type) {
            const msgDiv = document.getElementById('authMessage');
            if (msgDiv) {
                msgDiv.textContent = msg;
                msgDiv.className = type === 'error' ? 'error-message' : 'success-message';
            }
        }
        
        function attachMessengerEvents() {
            document.querySelectorAll('.chat-item').forEach(el => {
                el.onclick = () => {
                    const chatId = el.dataset.chatId;
                    if (chatId) {
                        currentSession.currentChatId = chatId;
                        renderApp();
                    }
                };
            });
            
            const sendBtn = document.getElementById('sendMsgBtn');
            const messageInput = document.getElementById('messageInput');
            
            const sendMessage = () => {
                const text = messageInput.value.trim();
                if (!text) return;
                const chatId = currentSession.currentChatId;
                const user = currentSession.user;
                addMessage(chatId, text, user.email, user.name);
                messageInput.value = '';
                renderApp();
            };
            
            if (sendBtn) sendBtn.onclick = sendMessage;
            if (messageInput) {
                messageInput.onkeypress = (e) => {
                    if (e.key === 'Enter') sendMessage();
                };
            }
            
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.onclick = () => {
                    currentSession.loggedIn = false;
                    currentSession.user = null;
                    renderApp();
                };
            }
        }
        
        // Глобальные переменные для почты
        window.YOUR_EMAIL = YOUR_EMAIL;
        window.YOUR_PASSWORD = YOUR_PASSWORD;
        
        // Инициализация
        loadData();
        
        const savedSession = localStorage.getItem('messenger_session');
        if (savedSession) {
            try {
                const session = JSON.parse(savedSession);
                const user = users.find(u => u.email === session.email);
                if (user) {
                    currentSession.user = user;
                    currentSession.loggedIn = true;
                    currentSession.currentChatId = session.chatId || chats[0]?.id;
                    addUserToChats(user.email);
                }
            } catch(e) {}
        }
        
        renderApp();
        
        window.addEventListener('beforeunload', () => {
            if (currentSession.loggedIn && currentSession.user) {
                localStorage.setItem('messenger_session', JSON.stringify({
                    email: currentSession.user.email,
                    chatId: currentSession.currentChatId
                }));
            }
        });
        
        console.log(`

║  2. Зайди на https://myaccount.google.com/apppasswords      ║
║  3. Выбери "Другое" → введи "SwiftChat"                     ║
║  4. Скопируй 16-значный пароль                              ║

║  🔑 После сохранения настроек — коды будут приходить на     ║
║     указанную почту!                                        ║

        `);
    </script>
