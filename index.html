<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OpenGL 1.3 Style Graphics (JS)</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a1e2c;
            margin: 0;
            padding: 20px;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: #0f1219;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .editor-panel {
            flex: 2;
            min-width: 300px;
        }
        .canvas-panel {
            flex: 1;
            min-width: 400px;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 400px;
            background: #0a0c12;
            color: #4c6ef5;
            border: 1px solid #2a2f3f;
            border-radius: 12px;
            padding: 12px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }
        canvas {
            background: #0a0c12;
            border-radius: 12px;
            box-shadow: 0 0 0 2px #2a2f3f;
            width: 100%;
            height: auto;
            cursor: crosshair;
        }
        button {
            background: #4c6ef5;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 40px;
            margin-top: 15px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            width: 100%;
        }
        button:active {
            transform: scale(0.97);
            background: #3b5bdb;
        }
        .output {
            background: #0a0c12;
            color: #a0a4b8;
            border-radius: 12px;
            padding: 10px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 12px;
            max-height: 100px;
            overflow-y: auto;
            text-align: left;
        }
        .copy-btn {
            background: #2a2f3f;
            margin-top: 8px;
            font-size: 14px;
            padding: 6px 12px;
            width: auto;
        }
        .error-line {
            color: #ff6b6b;
            white-space: pre-wrap;
        }
        .status {
            color: #a0a4b8;
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row">
        <div class="editor-panel">
            <textarea id="code">// Рисуем треугольники и квадраты
clear(0, 0, 0);

// Красный треугольник
color(1, 0, 0);
begin();
vertex(200, 50);
vertex(100, 150);
vertex(300, 150);
end();

// Зелёный квадрат
color(0, 1, 0);
begin();
vertex(50, 200);
vertex(150, 200);
vertex(150, 300);
vertex(50, 300);
end();

// Синий треугольник
color(0, 0, 1);
begin();
vertex(300, 250);
vertex(350, 200);
vertex(350, 300);
end();

// Розовый круг из треугольников
for (let i = 0; i < 36; i++) {
    let angle = i * 10 * Math.PI / 180;
    let x = 200 + Math.cos(angle) * 40;
    let y = 200 + Math.sin(angle) * 40;
    let x2 = 200 + Math.cos(angle + 0.174) * 40;
    let y2 = 200 + Math.sin(angle + 0.174) * 40;
    color(1, 0.5, 0.8);
    begin();
    vertex(200, 200);
    vertex(x, y);
    vertex(x2, y2);
    end();
}</textarea>
        </div>
        <div class="canvas-panel">
            <canvas id="canvas" width="400" height="400"></canvas>
            <button id="runBtn">▶ Запустить код</button>
            <div class="output" id="output">Нажмите "Запустить"</div>
            <button id="copyErrorsBtn" class="copy-btn">📋 Копировать ошибки</button>
        </div>
    </div>
    <div class="status">JavaScript с OpenGL-стилем: color(r,g,b), begin(), vertex(x,y), end(), clear(r,g,b)</div>
</div>

<script>
    // Telegram WebApp
    let tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
    }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const codeArea = document.getElementById('code');
    const outputDiv = document.getElementById('output');
    const copyErrorsBtn = document.getElementById('copyErrorsBtn');

    let errors = [];

    function clearOutput() {
        outputDiv.innerHTML = '';
        errors = [];
    }

    function addError(msg) {
        errors.push(msg);
        outputDiv.innerHTML += `<div class="error-line">⚠️ ${escapeHtml(msg)}</div>`;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // OpenGL-подобное состояние
    let currentColor = { r: 1, g: 1, b: 1 };
    let vertices = [];
    let inBegin = false;

    function rgbToStyle(r,g,b) {
        return `rgb(${Math.floor(r*255)}, ${Math.floor(g*255)}, ${Math.floor(b*255)})`;
    }

    function flushVertices() {
        if (vertices.length < 3) return;
        ctx.beginPath();
        ctx.moveTo(vertices[0].x, vertices[0].y);
        for (let i = 1; i < vertices.length; i++) {
            ctx.lineTo(vertices[i].x, vertices[i].y);
        }
        ctx.closePath();
        ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
        ctx.fill();
    }

    // Доступные функции для рисования
    const graphicsAPI = {
        clear: (r, g, b) => {
            ctx.fillStyle = rgbToStyle(r, g, b);
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        },
        color: (r, g, b) => {
            currentColor = { r, g, b };
        },
        begin: () => {
            if (inBegin) throw new Error("begin() уже вызван");
            inBegin = true;
            vertices = [];
        },
        vertex: (x, y) => {
            if (!inBegin) throw new Error("vertex() вне begin/end");
            vertices.push({ x, y });
        },
        end: () => {
            if (!inBegin) throw new Error("end() без begin");
            flushVertices();
            inBegin = false;
        }
    };

    function runUserCode(code) {
        // Сбрасываем состояние
        clearOutput();
        ctx.fillStyle = '#0a0c12';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        currentColor = { r: 1, g: 1, b: 1 };
        vertices = [];
        inBegin = false;

        // Обёртка для выполнения кода с перехватом ошибок
        const wrappedCode = `
            try {
                ${code}
            } catch(e) {
                window._runtimeError = e.message;
            }
        `;

        try {
            // Создаём функцию с доступом к API
            const func = new Function('clear', 'color', 'begin', 'vertex', 'end', wrappedCode);
            func(
                graphicsAPI.clear,
                graphicsAPI.color,
                graphicsAPI.begin,
                graphicsAPI.vertex,
                graphicsAPI.end
            );
            if (window._runtimeError) {
                addError(window._runtimeError);
                delete window._runtimeError;
            }
        } catch (e) {
            addError(e.message);
        }
    }

    document.getElementById('runBtn').addEventListener('click', () => {
        runUserCode(codeArea.value);
    });

    copyErrorsBtn.addEventListener('click', () => {
        if (errors.length === 0) {
            alert('Нет ошибок');
            return;
        }
        navigator.clipboard.writeText(errors.join('\n')).then(() => {
            alert(`Скопировано ${errors.length} ошибок`);
        });
    });

    // Запускаем пример при загрузке
    runUserCode(codeArea.value);
</script>
</body>
</html>
