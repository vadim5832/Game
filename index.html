<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OpenGL РђРЅРёРјР°С†РёСЏ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0c12;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        let scale = 1;
        let offsetX = 0, offsetY = 0;
        
        function updateScale() {
            const size = Math.min(canvas.width, canvas.height);
            scale = size / 400;
            offsetX = (canvas.width - size) / 2;
            offsetY = (canvas.height - size) / 2;
        }
        
        function tx(x) { return offsetX + x * scale; }
        function ty(y) { return offsetY + y * scale; }
        
        let currentColor = { r: 1, g: 1, b: 1 };
        let vertices = [];
        let currentMode = null;
        let inBegin = false;
        let stopAnim = false;
        let posX = 50.0;
        let direction = 1;
        let speed = 3;
        
        function rgbToStyle(r,g,b) { 
            return `rgb(${Math.floor(r*255)}, ${Math.floor(g*255)}, ${Math.floor(b*255)})`; 
        }
        
        function drawTriangles() {
            if (vertices.length < 3) return;
            for (let i = 0; i <= vertices.length - 3; i += 3) {
                ctx.beginPath();
                ctx.moveTo(tx(vertices[i].x), ty(vertices[i].y));
                ctx.lineTo(tx(vertices[i+1].x), ty(vertices[i+1].y));
                ctx.lineTo(tx(vertices[i+2].x), ty(vertices[i+2].y));
                ctx.closePath();
                ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
                ctx.fill();
            }
        }
        
        function drawQuads() {
            if (vertices.length < 4) return;
            for (let i = 0; i <= vertices.length - 4; i += 4) {
                ctx.beginPath();
                ctx.moveTo(tx(vertices[i].x), ty(vertices[i].y));
                ctx.lineTo(tx(vertices[i+1].x), ty(vertices[i+1].y));
                ctx.lineTo(tx(vertices[i+2].x), ty(vertices[i+2].y));
                ctx.lineTo(tx(vertices[i+3].x), ty(vertices[i+3].y));
                ctx.closePath();
                ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
                ctx.fill();
            }
        }
        
        function drawTriangleFan() {
            if (vertices.length < 2) return;
            let first = vertices[0];
            for (let i = 1; i < vertices.length - 1; i++) {
                ctx.beginPath();
                ctx.moveTo(tx(first.x), ty(first.y));
                ctx.lineTo(tx(vertices[i].x), ty(vertices[i].y));
                ctx.lineTo(tx(vertices[i+1].x), ty(vertices[i+1].y));
                ctx.closePath();
                ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
                ctx.fill();
            }
        }
        
        function flush() {
            if (vertices.length === 0) return;
            switch(currentMode) {
                case 'GL_TRIANGLES': drawTriangles(); break;
                case 'GL_QUADS': drawQuads(); break;
                case 'GL_TRIANGLE_FAN': drawTriangleFan(); break;
            }
            vertices = [];
        }
        
        const gl = {
            glColor3f: (r,g,b) => { currentColor = { r, g, b }; },
            glVertex3f: (x,y,z) => { 
                if (!inBegin) return; 
                vertices.push({ x, y }); 
            },
            glBegin: (mode) => { 
                inBegin = true; 
                currentMode = mode; 
                vertices = []; 
            },
            glEnd: () => { 
                flush(); 
                inBegin = false; 
                currentMode = null; 
            },
            glClear: () => { 
                ctx.fillStyle = '#0a0c12'; 
                ctx.fillRect(0, 0, canvas.width, canvas.height); 
            }
        };
        
        function delay(ms) { 
            return new Promise(r => setTimeout(r, ms)); 
        }
        
        // РџРћР›Р¬Р—РћР’РђРўР•Р›Р¬РЎРљРР™ РљРћР”:
        // РЁР°С…РјР°С‚РЅР°СЏ РґРѕСЃРєР°
void drawBoard() {
    int x;
    int y;
    for (y = 0; y < 8; y = y + 1) {
        for (x = 0; x < 8; x = x + 1) {
            if ((x + y) % 2 == 0) {
                glColor3f(0.2, 0.2, 0.2);
            } else {
                glColor3f(0.9, 0.9, 0.9);
            }
            glBegin(GL_QUADS);
                glVertex3f(x * 50.0, y * 50.0, 0.0);
                glVertex3f(x * 50.0 + 50.0, y * 50.0, 0.0);
                glVertex3f(x * 50.0 + 50.0, y * 50.0 + 50.0, 0.0);
                glVertex3f(x * 50.0, y * 50.0 + 50.0, 0.0);
            glEnd();
        }
    }
}

// Р РёСЃРѕРІР°РЅРёРµ РєСЂСѓРіР°
void drawCircle(float cx, float cy, float r, float red, float green, float blue) {
    glColor3f(red, green, blue);
    glBegin(GL_TRIANGLE_FAN);
        glVertex3f(cx, cy, 0.0);
        int i;
        for (i = 0; i <= 36; i = i + 1) {
            float angle = i * 10.0 * 3.14159 / 180.0;
            glVertex3f(cx + r * cos(angle), cy + r * sin(angle), 0.0);
        }
    glEnd();
}

// РђРЅРёРјР°С†РёСЏ
float posX;
float speed;
int direction;

posX = 50.0;
speed = 3.0;
direction = 1;

while (1) {
    glClear();
    drawBoard();
    
    posX = posX + speed * direction;
    
    if (posX > 350.0) {
        posX = 350.0;
        direction = -1;
    }
    if (posX < 50.0) {
        posX = 50.0;
        direction = 1;
    }
    
    drawCircle(posX, 300.0, 20.0, 1.0, 0.0, 0.0);
    delay(30);
}
        
        async function runAnim() {
            stopAnim = false;
            posX = 50.0;
            direction = 1;
            while (!stopAnim) {
                updateScale();
                glClear();
                drawBoard();
                posX = posX + speed * direction;
                if (posX > 350.0) { posX = 350.0; direction = -1; }
                if (posX < 50.0) { posX = 50.0; direction = 1; }
                drawCircle(posX, 300.0, 20.0, 1.0, 0.0, 0.0);
                await delay(30);
            }
        }
        
        runAnim();
    </script>
</body>
</html>
