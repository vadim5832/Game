<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OpenGL - Просто работай</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #2d2d30;
            margin: 0;
            padding: 20px;
            font-family: monospace;
        }
        
        .ide-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .toolbar {
            background: #2d2d30;
            padding: 10px;
            display: flex;
            gap: 10px;
        }
        
        .toolbar button {
            background: #0e639c;
            border: none;
            color: white;
            padding: 8px 20px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
        }
        
        .toolbar .save-btn {
            background: #2b7a3e;
        }
        
        .status-bar {
            background: #007acc;
            color: white;
            padding: 4px 10px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }
        
        .main-content {
            display: flex;
            min-height: 550px;
        }
        
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .panel-header {
            background: #252526;
            padding: 8px;
            color: #ccc;
            border-bottom: 1px solid #3e3e42;
        }
        
        textarea {
            flex: 1;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            resize: none;
            outline: none;
        }
        
        .output-panel {
            width: 350px;
            background: #1e1e1e;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #3e3e42;
        }
        
        .output-area {
            flex: 1;
            background: #1e1e1e;
            color: #ccc;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            overflow-y: auto;
        }
        
        .error-text { color: #f48771; }
        .success-text { color: #6a9955; }
        .info-text { color: #9cdcfe; }
        
        .animation-window {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2d2d30;
            border-radius: 12px;
            z-index: 1000;
            border: 2px solid #4c6ef5;
            display: none;
        }
        
        .animation-window.show {
            display: block;
        }
        
        .window-titlebar {
            background: #3e3e42;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            cursor: move;
        }
        
        .window-close {
            background: #e81123;
            border: none;
            color: white;
            width: 28px;
            cursor: pointer;
        }
        
        .window-content {
            padding: 20px;
            background: #0a0c12;
            text-align: center;
        }
        
        .animation-canvas {
            width: 400px;
            height: 400px;
            cursor: crosshair;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 999;
            display: none;
        }
        
        .overlay.show {
            display: block;
        }
    </style>
</head>
<body>
<div class="ide-container">
    <div class="toolbar">
        <button id="compileBtn">▶ Запустить (F5)</button>
        <button id="saveBtn" class="save-btn">💾 Сохранить</button>
    </div>
    <div class="status-bar">
        <span>OpenGL</span>
        <span id="statusText">Готов</span>
    </div>
    <div class="main-content">
        <div class="editor-panel">
            <div class="panel-header">📝 Твой код (пиши что хочешь)</div>
            <textarea id="code">// Шахматная доска
function drawBoard() {
    for (let y = 0; y < 8; y++) {
        for (let x = 0; x < 8; x++) {
            if ((x + y) % 2 == 0) {
                glColor3f(0.2, 0.2, 0.2);
            } else {
                glColor3f(0.9, 0.9, 0.9);
            }
            glBegin("GL_QUADS");
            glVertex3f(x * 50, y * 50);
            glVertex3f(x * 50 + 50, y * 50);
            glVertex3f(x * 50 + 50, y * 50 + 50);
            glVertex3f(x * 50, y * 50 + 50);
            glEnd();
        }
    }
}

// Круг
function drawCircle(cx, cy, r, red, green, blue) {
    glColor3f(red, green, blue);
    glBegin("GL_TRIANGLE_FAN");
    glVertex3f(cx, cy);
    for (let i = 0; i <= 36; i++) {
        let angle = i * 10 * Math.PI / 180;
        glVertex3f(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    }
    glEnd();
}

// Квадрат
function drawSquare(cx, cy, size, red, green, blue) {
    glColor3f(red, green, blue);
    glBegin("GL_QUADS");
    glVertex3f(cx, cy);
    glVertex3f(cx + size, cy);
    glVertex3f(cx + size, cy + size);
    glVertex3f(cx, cy + size);
    glEnd();
}

// Переменные
let posX = 50;
let speed = 3;
let direction = 1;

// ===== ЭТА ФУНКЦИЯ ВЫЗЫВАЕТСЯ ПРИ НАЖАТИИ НА ЭКРАН =====
// МОЖЕШЬ МЕНЯТЬ КАК ХОЧЕШЬ!
function onTap(x, y) {
    // Например рисуем желтый круг где нажали
    drawCircle(x, y, 15, 1, 1, 0);
}

// Анимация
let running = true;

async function animate() {
    while (running) {
        glClear();
        drawBoard();
        
        posX = posX + speed * direction;
        
        if (posX > 350) {
            posX = 350;
            direction = -1;
        }
        if (posX < 50) {
            posX = 50;
            direction = 1;
        }
        
        drawSquare(posX - 45, 295, 30, 0.2, 0.4, 0.8);
        drawSquare(posX + 35, 295, 30, 0.2, 0.8, 0.2);
        
        await delay(30);
    }
}

animate();</textarea>
        </div>
        <div class="output-panel">
            <div class="panel-header">📟 Вывод</div>
            <div class="output-area" id="output">> Готов. Нажми F5</div>
        </div>
    </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="animation-window" id="animationWindow">
    <div class="window-titlebar" id="titlebar">
        <span>Анимация</span>
        <button class="window-close" id="closeBtn">✕</button>
    </div>
    <div class="window-content">
        <canvas id="canvas" width="400" height="400" class="animation-canvas"></canvas>
        <div style="margin-top: 10px; color: #4c6ef5;" id="coordsText">👆 Нажми</div>
        <div style="margin-top: 10px;">
            <button id="stopBtn">⏹ Стоп</button>
        </div>
    </div>
</div>

<script>
    // Элементы
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const output = document.getElementById('output');
    const statusSpan = document.getElementById('statusText');
    const codeArea = document.getElementById('code');
    const coordsText = document.getElementById('coordsText');
    
    // OpenGL эмуляция
    let color = { r: 1, g: 1, b: 1 };
    let verts = [];
    let mode = null;
    
    function drawQuads() {
        for (let i = 0; i <= verts.length - 4; i += 4) {
            ctx.beginPath();
            ctx.moveTo(verts[i].x, verts[i].y);
            ctx.lineTo(verts[i+1].x, verts[i+1].y);
            ctx.lineTo(verts[i+2].x, verts[i+2].y);
            ctx.lineTo(verts[i+3].x, verts[i+3].y);
            ctx.fillStyle = `rgb(${color.r*255},${color.g*255},${color.b*255})`;
            ctx.fill();
        }
    }
    
    function drawTriangleFan() {
        if (verts.length < 2) return;
        let first = verts[0];
        for (let i = 1; i < verts.length - 1; i++) {
            ctx.beginPath();
            ctx.moveTo(first.x, first.y);
            ctx.lineTo(verts[i].x, verts[i].y);
            ctx.lineTo(verts[i+1].x, verts[i+1].y);
            ctx.fillStyle = `rgb(${color.r*255},${color.g*255},${color.b*255})`;
            ctx.fill();
        }
    }
    
    function flush() {
        if (verts.length === 0) return;
        if (mode === 'GL_QUADS') drawQuads();
        else if (mode === 'GL_TRIANGLE_FAN') drawTriangleFan();
        verts = [];
    }
    
    // Глобальные функции для пользовательского кода
    window.glColor3f = (r,g,b) => { color = { r, g, b }; };
    window.glVertex3f = (x,y) => { verts.push({ x, y }); };
    window.glBegin = (m) => { mode = m; verts = []; };
    window.glEnd = () => { flush(); mode = null; };
    window.glClear = () => {
        ctx.fillStyle = '#0a0c12';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    };
    window.delay = (ms) => new Promise(r => setTimeout(r, ms));
    
    // Вывод
    function addOutput(msg, type = 'info') {
        const cls = type === 'error' ? 'error-text' : (type === 'success' ? 'success-text' : 'info-text');
        output.innerHTML += `<div class="${cls}">> ${msg}</div>`;
        output.scrollTop = output.scrollHeight;
    }
    
    // Отслеживание нажатий
    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let cx, cy;
        if (e.touches) {
            cx = e.touches[0].clientX;
            cy = e.touches[0].clientY;
        } else {
            cx = e.clientX;
            cy = e.clientY;
        }
        let x = (cx - rect.left) * scaleX;
        let y = (cy - rect.top) * scaleY;
        x = Math.max(0, Math.min(canvas.width, x));
        y = Math.max(0, Math.min(canvas.height, y));
        return { x: Math.floor(x), y: Math.floor(y) };
    }
    
    function onCanvasClick(e) {
        e.preventDefault();
        const c = getCoords(e);
        coordsText.innerHTML = `👆 X=${c.x}, Y=${c.y}`;
        addOutput(`Нажатие: X=${c.x}, Y=${c.y}`, 'click');
        
        // Вызываем пользовательскую функцию onTap если есть
        if (typeof window.onTap === 'function') {
            try {
                window.onTap(c.x, c.y);
            } catch(err) {
                addOutput(`Ошибка в onTap: ${err.message}`, 'error');
            }
        }
        
        // Визуальный фидбек
        ctx.fillStyle = 'yellow';
        ctx.beginPath();
        ctx.arc(c.x, c.y, 5, 0, 2 * Math.PI);
        ctx.fill();
        setTimeout(() => {}, 100);
    }
    
    canvas.addEventListener('click', onCanvasClick);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onCanvasClick(e); });
    
    // Запуск кода
    let currentAnimation = null;
    let runningFlag = false;
    
    async function runCode() {
        const code = codeArea.value;
        
        output.innerHTML = '';
        addOutput('Запуск...', 'info');
        
        try {
            // Останавливаем старую анимацию
            if (window.running) window.running = false;
            await delay(100);
            
            // Создаем новую функцию
            const func = new Function(`
                window.running = true;
                ${code}
            `);
            
            func();
            
            addOutput('✅ Запущено', 'success');
            statusSpan.innerText = 'Работает';
        } catch(err) {
            addOutput(`❌ Ошибка: ${err.message}`, 'error');
            statusSpan.innerText = 'Ошибка';
            console.error(err);
        }
    }
    
    async function compileAndRun() {
        document.getElementById('animationWindow').classList.add('show');
        document.getElementById('overlay').classList.add('show');
        await runCode();
    }
    
    function stopAnim() {
        if (window.running) window.running = false;
        addOutput('⏹ Остановлено', 'info');
        statusSpan.innerText = 'Остановлено';
        ctx.fillStyle = '#0a0c12';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    
    function closeWindow() {
        if (window.running) window.running = false;
        document.getElementById('animationWindow').classList.remove('show');
        document.getElementById('overlay').classList.remove('show');
        statusSpan.innerText = 'Закрыто';
    }
    
    function saveHTML() {
        const currentCode = codeArea.value;
        const html = `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>OpenGL</title>
<style>body{margin:0;background:#0a0c12;}canvas{width:100vw;height:100vh;}</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize();window.onresize=resize;
let scale=Math.min(canvas.width,canvas.height)/400;
let offX=(canvas.width-400*scale)/2;
let offY=(canvas.height-400*scale)/2;
function tx(x){return offX+x*scale;}
function ty(y){return offY+y*scale;}
let color={r:1,g:1,b:1};
let verts=[];
let mode=null;
function drawQuads(){
    for(let i=0;i<=verts.length-4;i+=4){
        ctx.beginPath();
        ctx.moveTo(tx(verts[i].x),ty(verts[i].y));
        ctx.lineTo(tx(verts[i+1].x),ty(verts[i+1].y));
        ctx.lineTo(tx(verts[i+2].x),ty(verts[i+2].y));
        ctx.lineTo(tx(verts[i+3].x),ty(verts[i+3].y));
        ctx.fillStyle=\`rgb(\${color.r*255},\${color.g*255},\${color.b*255})\`;
        ctx.fill();
    }
}
function drawTriangleFan(){
    if(verts.length<2)return;
    let first=verts[0];
    for(let i=1;i<verts.length-1;i++){
        ctx.beginPath();
        ctx.moveTo(tx(first.x),ty(first.y));
        ctx.lineTo(tx(verts[i].x),ty(verts[i].y));
        ctx.lineTo(tx(verts[i+1].x),ty(verts[i+1].y));
        ctx.fillStyle=\`rgb(\${color.r*255},\${color.g*255},\${color.b*255})\`;
        ctx.fill();
    }
}
function flush(){
    if(verts.length===0)return;
    if(mode==='GL_QUADS')drawQuads();
    else if(mode==='GL_TRIANGLE_FAN')drawTriangleFan();
    verts=[];
}
window.glColor3f=(r,g,b)=>{color={r,g,b};};
window.glVertex3f=(x,y)=>{verts.push({x,y});};
window.glBegin=(m)=>{mode=m;verts=[];};
window.glEnd=()=>{flush();mode=null;};
window.glClear=()=>{
    ctx.fillStyle='#0a0c12';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    scale=Math.min(canvas.width,canvas.height)/400;
    offX=(canvas.width-400*scale)/2;
    offY=(canvas.height-400*scale)/2;
};
window.delay=(ms)=>new Promise(r=>setTimeout(r,ms));

// ТВОЙ КОД
${currentCode.replace(/<\/script>/gi, '<\\/script>')}
<\/script>
</body>
</html>`;
        
        const blob = new Blob([html], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'opengl.html';
        a.click();
        URL.revokeObjectURL(blob);
        addOutput('💾 Сохранено', 'success');
    }
    
    document.getElementById('compileBtn').onclick = compileAndRun;
    document.getElementById('saveBtn').onclick = saveHTML;
    document.getElementById('closeBtn').onclick = closeWindow;
    document.getElementById('stopBtn').onclick = stopAnim;
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'F5') {
            e.preventDefault();
            compileAndRun();
        }
    });
    
    // Перетаскивание
    let drag = false, dx, dy;
    const win = document.getElementById('animationWindow');
    const title = document.getElementById('titlebar');
    title.onmousedown = (e) => {
        drag = true;
        dx = e.clientX - win.offsetLeft;
        dy = e.clientY - win.offsetTop;
    };
    document.onmousemove = (e) => {
        if (drag) {
            win.style.left = (e.clientX - dx) + 'px';
            win.style.top = (e.clientY - dy) + 'px';
            win.style.transform = 'none';
        }
    };
    document.onmouseup = () => { drag = false; };
    
    addOutput('Готов. Нажми F5', 'success');
    addOutput('В коде есть функция onTap(x,y) - вызывается при нажатии', 'info');
    addOutput('Меняй её как хочешь!', 'info');
</script>
</body>
</html>
