<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SwiftChat | Многопользовательский мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* главный контейнер */
        .app-container {
            width: 100%;
            max-width: 1400px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
        }

        /* боковая панель с чатами */
        .chats-sidebar {
            width: 320px;
            background: rgba(15, 25, 35, 0.95);
            border-right: 1px solid rgba(46, 204, 113, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .user-info {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid #2ecc7133;
        }

        .user-email {
            color: #2ecc71;
            font-weight: 600;
            font-size: 0.85rem;
            word-break: break-all;
        }

        .user-name {
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 5px;
        }

        .logout-btn {
            margin-top: 12px;
            background: rgba(231, 76, 60, 0.8);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #e74c3c;
        }

        .chats-header {
            padding: 16px 20px;
            color: white;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.2);
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-item {
            padding: 14px 16px;
            margin-bottom: 6px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: rgba(46, 204, 113, 0.15);
            border-color: #2ecc7144;
        }

        .chat-item.active {
            background: rgba(46, 204, 113, 0.25);
            border-color: #2ecc71;
        }

        .chat-name {
            color: white;
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .chat-preview {
            color: #8aaec0;
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-badge {
            background: #2ecc71;
            color: #0a1a22;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        /* основная область чата */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(10, 20, 28, 0.8);
        }

        .chat-header {
            padding: 18px 24px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid #2ecc7133;
        }

        .current-chat-name {
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .current-chat-status {
            color: #2ecc71;
            font-size: 0.75rem;
            margin-top: 4px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.2s ease;
        }

        .message.outgoing {
            align-self: flex-end;
        }

        .message.incoming {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .outgoing .message-bubble {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: #0a1a22;
            border-bottom-right-radius: 4px;
        }

        .incoming .message-bubble {
            background: #1e3a4a;
            color: #eef4ff;
            border-bottom-left-radius: 4px;
            border: 1px solid #2ecc7144;
        }

        .message-meta {
            font-size: 0.65rem;
            margin-top: 4px;
            color: #7e95a3;
            display: flex;
            gap: 12px;
        }

        .outgoing .message-meta {
            justify-content: flex-end;
        }

        .typing-indicator {
            font-size: 0.75rem;
            color: #2ecc71;
            padding: 8px 16px;
            margin-left: 20px;
        }

        .input-area {
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid #2ecc7133;
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            background: #0a1a24;
            border: 1px solid #2ecc7144;
            padding: 12px 18px;
            border-radius: 40px;
            font-size: 0.95rem;
            color: white;
            outline: none;
        }

        .input-area input:focus {
            border-color: #2ecc71;
        }

        .input-area button {
            background: #2ecc71;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .input-area button:hover {
            background: #27ae60;
            transform: scale(0.98);
        }

        /* модальное окно авторизации */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .auth-modal {
            background: #1e2f3c;
            border-radius: 32px;
            padding: 32px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid #2ecc7166;
        }

        .auth-modal h2 {
            color: white;
            margin-bottom: 24px;
            text-align: center;
        }

        .auth-input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            background: #0a1a24;
            border: 1px solid #2ecc7144;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .auth-input:focus {
            border-color: #2ecc71;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #2ecc71;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
        }

        .auth-code-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #2ecc7144;
        }

        .code-input-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .small-btn {
            background: #3498db;
            padding: 12px 16px;
            font-size: 0.85rem;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.8rem;
            margin-top: 8px;
            text-align: center;
        }

        .success-message {
            color: #2ecc71;
            font-size: 0.8rem;
            text-align: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .messages-area::-webkit-scrollbar {
            width: 5px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #1e2f3c;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #2ecc71;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .chats-sidebar {
                width: 260px;
            }
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>

<div id="app"></div>

<script>
    // ============================================
    //   МЕССЕНДЖЕР С ЧАТАМИ + АВТОРИЗАЦИЯ
    //   (почта + код подтверждения + пароль)
    // ============================================
    
    // --- База данных пользователей и чатов (mock) ---
    // Хранилище: пользователи, сессии, сообщения по чатам
    
    const usersDB = [
        { email: "alex@example.com", password: "123456", name: "Алексей", code: "123456", codeVerified: false },
        { email: "maria@example.com", password: "qwerty", name: "Мария", code: "789012", codeVerified: false },
        { email: "demo@chat.com", password: "demo123", name: "Демо Пользователь", code: "000000", codeVerified: false }
    ];
    
    // Чаты (диалоги между пользователями)
    let chatsDB = [
        { id: "chat1", name: "Общий чат", type: "group", participants: ["alex@example.com", "maria@example.com", "demo@chat.com"], lastMessage: "Добро пожаловать!" },
        { id: "chat2", name: "Алексей и Мария", type: "private", participants: ["alex@example.com", "maria@example.com"], lastMessage: "Привет!" },
        { id: "chat3", name: "Техподдержка", type: "group", participants: ["demo@chat.com", "alex@example.com"], lastMessage: "Чем можем помочь?" }
    ];
    
    // Сообщения по чатам
    let messagesDB = {
        chat1: [
            { id: "m1", text: "Всем привет! Это общий чат", sender: "alex@example.com", timestamp: Date.now() - 3600000, senderName: "Алексей" },
            { id: "m2", text: "Рад видеть всех!", sender: "maria@example.com", timestamp: Date.now() - 3000000, senderName: "Мария" }
        ],
        chat2: [
            { id: "m3", text: "Привет, как дела?", sender: "alex@example.com", timestamp: Date.now() - 7200000, senderName: "Алексей" },
            { id: "m4", text: "Отлично! А у тебя?", sender: "maria@example.com", timestamp: Date.now() - 7000000, senderName: "Мария" }
        ],
        chat3: [
            { id: "m5", text: "Здравствуйте, у меня вопрос", sender: "demo@chat.com", timestamp: Date.now() - 5000000, senderName: "Демо Пользователь" }
        ]
    };
    
    // Непрочитанные сообщения { chatId: { userEmail: count } }
    let unreadMessages = {};
    
    // Текущая сессия
    let currentSession = {
        user: null,
        loggedIn: false,
        currentChatId: "chat1"
    };
    
    // Временное хранение кода подтверждения
    let tempAuthCode = null;
    let tempEmailForAuth = null;
    
    // --- Вспомогательные функции ---
    function generateId() {
        return Date.now().toString(36) + Math.random().toString(36).substring(2);
    }
    
    // Отправить код подтверждения (имитация email)
    function sendVerificationCode(email) {
        return new Promise((resolve) => {
            setTimeout(() => {
                const user = usersDB.find(u => u.email === email);
                if (user) {
                    tempAuthCode = user.code;
                    resolve({ success: true, message: "Код подтверждения отправлен на почту" });
                } else {
                    resolve({ success: false, message: "Пользователь не найден" });
                }
            }, 500);
        });
    }
    
    // Проверка кода
    function verifyCode(email, code) {
        const user = usersDB.find(u => u.email === email);
        if (user && user.code === code) {
            user.codeVerified = true;
            return { success: true };
        }
        return { success: false, message: "Неверный код подтверждения" };
    }
    
    // Логин с паролем (после подтверждения кода)
    function loginWithPassword(email, password) {
        const user = usersDB.find(u => u.email === email && u.password === password);
        if (user && user.codeVerified) {
            return { success: true, user };
        }
        if (user && !user.codeVerified) {
            return { success: false, message: "Сначала подтвердите email кодом" };
        }
        return { success: false, message: "Неверный email или пароль" };
    }
    
    // Добавить сообщение
    function addMessage(chatId, text, senderEmail, senderName) {
        if (!messagesDB[chatId]) messagesDB[chatId] = [];
        const newMsg = {
            id: generateId(),
            text: text.trim(),
            sender: senderEmail,
            senderName: senderName,
            timestamp: Date.now()
        };
        messagesDB[chatId].push(newMsg);
        
        // Обновить lastMessage в чате
        const chat = chatsDB.find(c => c.id === chatId);
        if (chat) chat.lastMessage = text.substring(0, 50);
        
        // Отметить непрочитанные для других участников
        if (chat) {
            chat.participants.forEach(participant => {
                if (participant !== senderEmail) {
                    if (!unreadMessages[chatId]) unreadMessages[chatId] = {};
                    if (!unreadMessages[chatId][participant]) unreadMessages[chatId][participant] = 0;
                    unreadMessages[chatId][participant]++;
                }
            });
        }
        
        return newMsg;
    }
    
    // Получить сообщения чата
    function getChatMessages(chatId) {
        return messagesDB[chatId] ? [...messagesDB[chatId]].sort((a,b) => a.timestamp - b.timestamp) : [];
    }
    
    // Очистить непрочитанные для текущего пользователя и чата
    function clearUnread(chatId, userEmail) {
        if (unreadMessages[chatId] && unreadMessages[chatId][userEmail]) {
            unreadMessages[chatId][userEmail] = 0;
        }
    }
    
    // Получить количество непрочитанных для пользователя в чате
    function getUnreadCount(chatId, userEmail) {
        return unreadMessages[chatId]?.[userEmail] || 0;
    }
    
    // --- Рендеринг приложения ---
    let currentRenderTimeout = null;
    
    function renderApp() {
        const app = document.getElementById('app');
        if (!currentSession.loggedIn || !currentSession.user) {
            app.innerHTML = renderAuthModal();
            attachAuthEvents();
        } else {
            app.innerHTML = renderMessenger();
            attachMessengerEvents();
            scrollToBottom();
        }
    }
    
    function renderAuthModal() {
        return `
            <div class="auth-overlay">
                <div class="auth-modal">
                    <h2>📧 Вход в мессенджер</h2>
                    <input type="email" id="authEmail" class="auth-input" placeholder="Email" value="">
                    <div id="codeSection" style="display: none;">
                        <div class="auth-code-section">
                            <input type="text" id="authCode" class="auth-input" placeholder="Код подтверждения">
                            <div class="code-input-group">
                                <button id="verifyCodeBtn" class="auth-btn small-btn">✅ Подтвердить код</button>
                            </div>
                        </div>
                    </div>
                    <div id="passwordSection" style="display: none;">
                        <input type="password" id="authPassword" class="auth-input" placeholder="Пароль">
                        <button id="loginBtn" class="auth-btn">🔓 Войти</button>
                    </div>
                    <button id="sendCodeBtn" class="auth-btn">📩 Получить код подтверждения</button>
                    <div id="authMessage" class="error-message"></div>
                    <div style="margin-top: 16px; font-size: 0.7rem; color: #7e95a3; text-align: center;">
                        Тестовые аккаунты: alex@example.com / 123456<br>
                        maria@example.com / qwerty<br>
                        demo@chat.com / demo123<br>
                        Код подтверждения: 123456, 789012, 000000
                    </div>
                </div>
            </div>
        `;
    }
    
    function renderMessenger() {
        const user = currentSession.user;
        const chats = chatsDB.filter(chat => chat.participants.includes(user.email));
        const currentChat = chatsDB.find(c => c.id === currentSession.currentChatId);
        const messages = currentChat ? getChatMessages(currentChat.id) : [];
        
        return `
            <div class="app-container">
                <div class="chats-sidebar">
                    <div class="user-info">
                        <div class="user-email">${escapeHtml(user.email)}</div>
                        <div class="user-name">👤 ${escapeHtml(user.name)}</div>
                        <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
                    </div>
                    <div class="chats-header">💬 Мои чаты</div>
                    <div class="chats-list" id="chatsList">
                        ${chats.map(chat => `
                            <div class="chat-item ${chat.id === currentSession.currentChatId ? 'active' : ''}" data-chat-id="${chat.id}">
                                <div class="chat-name">
                                    <span>${escapeHtml(chat.name)}</span>
                                    ${getUnreadCount(chat.id, user.email) > 0 ? `<span class="unread-badge">${getUnreadCount(chat.id, user.email)}</span>` : ''}
                                </div>
                                <div class="chat-preview">${escapeHtml(chat.lastMessage || 'Нет сообщений')}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="chat-main">
                    <div class="chat-header">
                        <div class="current-chat-name">${currentChat ? escapeHtml(currentChat.name) : 'Выберите чат'}</div>
                        <div class="current-chat-status">${currentChat ? `Участников: ${currentChat.participants.length}` : ''}</div>
                    </div>
                    <div class="messages-area" id="messagesArea">
                        ${messages.map(msg => `
                            <div class="message ${msg.sender === user.email ? 'outgoing' : 'incoming'}">
                                <div class="message-bubble">${escapeHtml(msg.text)}</div>
                                <div class="message-meta">
                                    <span>${msg.sender === user.email ? 'Вы' : escapeHtml(msg.senderName)}</span>
                                    <span>${new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                </div>
                            </div>
                        `).join('')}
                        ${messages.length === 0 ? '<div style="text-align:center; color:#7e95a3; padding:40px;">💬 Нет сообщений. Напишите что-нибудь!</div>' : ''}
                    </div>
                    <div id="typingIndicator" class="typing-indicator" style="display: none;">✍️ кто-то печатает...</div>
                    <div class="input-area">
                        <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
                        <button id="sendMsgBtn">📨 Отправить</button>
                    </div>
                </div>
            </div>
        `;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function scrollToBottom() {
        setTimeout(() => {
            const area = document.getElementById('messagesArea');
            if (area) area.scrollTop = area.scrollHeight;
        }, 50);
    }
    
    // --- Обработчики авторизации ---
    function attachAuthEvents() {
        const sendCodeBtn = document.getElementById('sendCodeBtn');
        const verifyCodeBtn = document.getElementById('verifyCodeBtn');
        const loginBtn = document.getElementById('loginBtn');
        const authEmail = document.getElementById('authEmail');
        const authMessage = document.getElementById('authMessage');
        
        if (sendCodeBtn) {
            sendCodeBtn.onclick = async () => {
                const email = authEmail.value.trim();
                if (!email) {
                    authMessage.textContent = 'Введите email';
                    return;
                }
                const result = await sendVerificationCode(email);
                if (result.success) {
                    tempEmailForAuth = email;
                    document.getElementById('codeSection').style.display = 'block';
                    authMessage.className = 'success-message';
                    authMessage.textContent = result.message;
                } else {
                    authMessage.className = 'error-message';
                    authMessage.textContent = result.message;
                }
            };
        }
        
        if (verifyCodeBtn) {
            verifyCodeBtn.onclick = () => {
                const code = document.getElementById('authCode').value.trim();
                if (!tempEmailForAuth) {
                    authMessage.textContent = 'Сначала запросите код';
                    return;
                }
                const result = verifyCode(tempEmailForAuth, code);
                if (result.success) {
                    document.getElementById('passwordSection').style.display = 'block';
                    authMessage.className = 'success-message';
                    authMessage.textContent = 'Код подтвержден! Введите пароль';
                } else {
                    authMessage.className = 'error-message';
                    authMessage.textContent = result.message;
                }
            };
        }
        
        if (loginBtn) {
            loginBtn.onclick = () => {
                const password = document.getElementById('authPassword').value;
                if (!tempEmailForAuth) {
                    authMessage.textContent = 'Сначала подтвердите email';
                    return;
                }
                const result = loginWithPassword(tempEmailForAuth, password);
                if (result.success) {
                    currentSession.user = result.user;
                    currentSession.loggedIn = true;
                    currentSession.currentChatId = chatsDB.find(c => c.participants.includes(result.user.email))?.id || "chat1";
                    renderApp();
                } else {
                    authMessage.className = 'error-message';
                    authMessage.textContent = result.message;
                }
            };
        }
    }
    
    // --- Обработчики мессенджера ---
    function attachMessengerEvents() {
        // Переключение чатов
        document.querySelectorAll('.chat-item').forEach(el => {
            el.onclick = () => {
                const chatId = el.dataset.chatId;
                if (chatId) {
                    currentSession.currentChatId = chatId;
                    clearUnread(chatId, currentSession.user.email);
                    renderApp();
                }
            };
        });
        
        // Отправка сообщения
        const sendBtn = document.getElementById('sendMsgBtn');
        const messageInput = document.getElementById('messageInput');
        
        const sendMessage = () => {
            const text = messageInput.value.trim();
            if (!text) return;
            
            const chatId = currentSession.currentChatId;
            const user = currentSession.user;
            addMessage(chatId, text, user.email, user.name);
            
            // Имитация ответа бота (для демонстрации)
            if (Math.random() > 0.7 && chatId === "chat1") {
                setTimeout(() => {
                    const botReplies = ["Интересно!", "Понял, спасибо!", "Отличный мессенджер!", "🔥"];
                    const reply = botReplies[Math.floor(Math.random() * botReplies.length)];
                    addMessage(chatId, reply, "alex@example.com", "Алексей");
                    if (currentSession.currentChatId === chatId) renderApp();
                }, 1000);
            }
            
            messageInput.value = '';
            renderApp();
        };
        
        if (sendBtn) sendBtn.onclick = sendMessage;
        if (messageInput) {
            messageInput.onkeypress = (e) => {
                if (e.key === 'Enter') sendMessage();
            };
        }
        
        // Выход
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.onclick = () => {
                currentSession.loggedIn = false;
                currentSession.user = null;
                tempEmailForAuth = null;
                tempAuthCode = null;
                renderApp();
            };
        }
    }
    
    // Инициализация
    renderApp();
</script>

</body>
</html>
