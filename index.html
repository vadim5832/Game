<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OpenGL - Анимация круга (ИСПРАВЛЕНО)</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #1a1e2c; margin: 0; padding: 20px; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 1200px; width: 100%; background: #0f1219; border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .row { display: flex; gap: 20px; flex-wrap: wrap; }
        .editor-panel { flex: 2; min-width: 300px; }
        .canvas-panel { flex: 1; min-width: 400px; text-align: center; }
        textarea { width: 100%; height: 450px; background: #0a0c12; color: #4c6ef5; border: 1px solid #2a2f3f; border-radius: 12px; padding: 12px; font-family: monospace; font-size: 13px; resize: vertical; }
        canvas { background: #0a0c12; border-radius: 12px; box-shadow: 0 0 0 2px #2a2f3f; width: 100%; height: auto; cursor: crosshair; }
        button { background: #4c6ef5; border: none; color: white; font-size: 18px; font-weight: bold; padding: 10px 25px; border-radius: 40px; margin-top: 15px; cursor: pointer; width: 100%; }
        button:active { transform: scale(0.97); background: #3b5bdb; }
        .output { background: #0a0c12; color: #a0a4b8; border-radius: 12px; padding: 10px; margin-top: 15px; font-family: monospace; font-size: 12px; max-height: 100px; overflow-y: auto; text-align: left; }
        .copy-btn { background: #2a2f3f; margin-top: 8px; font-size: 14px; padding: 6px 12px; width: auto; }
        .error-line { color: #ff6b6b; white-space: pre-wrap; }
        .success-line { color: #6c8eff; white-space: pre-wrap; }
        .status { color: #a0a4b8; margin-top: 10px; font-size: 12px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="row">
        <div class="editor-panel">
            <textarea id="code">// Шахматная доска
void drawBoard() {
    int x;
    int y;
    for (y = 0; y < 8; y = y + 1) {
        for (x = 0; x < 8; x = x + 1) {
            if ((x + y) % 2 == 0) {
                glColor3f(0.2, 0.2, 0.2);
            } else {
                glColor3f(0.9, 0.9, 0.9);
            }
            glBegin(GL_QUADS);
                glVertex3f(x * 50.0, y * 50.0, 0.0);
                glVertex3f(x * 50.0 + 50.0, y * 50.0, 0.0);
                glVertex3f(x * 50.0 + 50.0, y * 50.0 + 50.0, 0.0);
                glVertex3f(x * 50.0, y * 50.0 + 50.0, 0.0);
            glEnd();
        }
    }
}

// Рисование круга
void drawCircle(float cx, float cy, float r, float red, float green, float blue) {
    glColor3f(red, green, blue);
    glBegin(GL_TRIANGLE_FAN);
        glVertex3f(cx, cy, 0.0);
        int i;
        for (i = 0; i <= 36; i = i + 1) {
            float angle = i * 10.0 * 3.14159 / 180.0;
            glVertex3f(cx + r * cos(angle), cy + r * sin(angle), 0.0);
        }
    glEnd();
}

// Анимация
float posX;
float speed;
int direction;

posX = 50.0;
speed = 3.0;
direction = 1;

while (1) {
    glClear();
    drawBoard();
    
    posX = posX + speed * direction;
    
    if (posX > 350.0) {
        posX = 350.0;
        direction = -1;
    }
    if (posX < 50.0) {
        posX = 50.0;
        direction = 1;
    }
    
    drawCircle(posX, 300.0, 20.0, 1.0, 0.0, 0.0);
    delay(30);
}</textarea>
        </div>
        <div class="canvas-panel">
            <canvas id="canvas" width="400" height="400"></canvas>
            <button id="runBtn">▶ Запустить код</button>
            <div class="output" id="output">Нажмите "Запустить"</div>
            <button id="copyErrorsBtn" class="copy-btn">📋 Копировать ошибки</button>
        </div>
    </div>
    <div class="status">🔴 Красный круг бегает по шахматной доске | Отскок от краёв</div>
</div>

<script>
    let tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const codeArea = document.getElementById('code');
    const outputDiv = document.getElementById('output');
    const copyErrorsBtn = document.getElementById('copyErrorsBtn');
    let errors = [];
    let stopAnimation = false;

    function clearOutput() { 
        outputDiv.innerHTML = ''; 
        errors = []; 
    }
    
    function addError(msg) { 
        errors.push(msg); 
        outputDiv.innerHTML += `<div class="error-line">⚠️ ${escapeHtml(msg)}</div>`; 
    }
    
    function addSuccess(msg) {
        outputDiv.innerHTML += `<div class="success-line">✅ ${escapeHtml(msg)}</div>`;
    }
    
    function escapeHtml(str) { 
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); 
    }

    // GL контекст
    let currentColor = { r: 1, g: 1, b: 1 };
    let vertices = [];
    let currentMode = null;
    let inBegin = false;

    function rgbToStyle(r,g,b) { 
        return `rgb(${Math.floor(r*255)}, ${Math.floor(g*255)}, ${Math.floor(b*255)})`; 
    }

    function drawTriangles() {
        if (vertices.length < 3) return;
        for (let i = 0; i <= vertices.length - 3; i += 3) {
            ctx.beginPath();
            ctx.moveTo(vertices[i].x, vertices[i].y);
            ctx.lineTo(vertices[i+1].x, vertices[i+1].y);
            ctx.lineTo(vertices[i+2].x, vertices[i+2].y);
            ctx.closePath();
            ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
            ctx.fill();
        }
    }

    function drawQuads() {
        if (vertices.length < 4) return;
        for (let i = 0; i <= vertices.length - 4; i += 4) {
            ctx.beginPath();
            ctx.moveTo(vertices[i].x, vertices[i].y);
            ctx.lineTo(vertices[i+1].x, vertices[i+1].y);
            ctx.lineTo(vertices[i+2].x, vertices[i+2].y);
            ctx.lineTo(vertices[i+3].x, vertices[i+3].y);
            ctx.closePath();
            ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
            ctx.fill();
        }
    }

    function drawTriangleFan() {
        if (vertices.length < 2) return;
        let first = vertices[0];
        for (let i = 1; i < vertices.length - 1; i++) {
            ctx.beginPath();
            ctx.moveTo(first.x, first.y);
            ctx.lineTo(vertices[i].x, vertices[i].y);
            ctx.lineTo(vertices[i+1].x, vertices[i+1].y);
            ctx.closePath();
            ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
            ctx.fill();
        }
    }

    function flush() {
        if (vertices.length === 0) return;
        switch(currentMode) {
            case 'GL_TRIANGLES': drawTriangles(); break;
            case 'GL_QUADS': drawQuads(); break;
            case 'GL_TRIANGLE_FAN': drawTriangleFan(); break;
        }
        vertices = [];
    }

    const gl = {
        glColor3f: (r,g,b) => { 
            currentColor = { r: r, g: g, b: b }; 
        },
        glVertex3f: (x,y,z) => { 
            if (!inBegin) throw new Error("glVertex3f вне glBegin/glEnd"); 
            vertices.push({ x: x, y: y }); 
        },
        glBegin: (mode) => { 
            if (inBegin) throw new Error("glBegin уже вызван");
            inBegin = true; 
            currentMode = mode;
            vertices = [];
        },
        glEnd: () => { 
            if (!inBegin) throw new Error("glEnd без glBegin");
            flush();
            inBegin = false;
            currentMode = null;
        },
        glClear: () => { 
            ctx.fillStyle = '#0a0c12'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height); 
        }
    };

    function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    // Прямой интерпретатор C-подобного кода (без сложных regexp)
    async function runCode(code) {
        stopAnimation = true;
        await delay(50);
        stopAnimation = false;
        
        clearOutput();
        gl.glClear();
        
        currentColor = { r: 1, g: 1, b: 1 };
        vertices = [];
        inBegin = false;
        currentMode = null;
        
        // Создаём окружение для переменных
        const vars = {};
        const functions = {};
        
        // Разбиваем код на строки
        const lines = code.split('\n');
        
        // Сначала собираем все функции
        let i = 0;
        while (i < lines.length) {
            let line = lines[i].trim();
            
            // Пропускаем комментарии
            if (line.startsWith('//')) {
                i++;
                continue;
            }
            
            // Объявление функции
            if (line.match(/^void\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*\(/)) {
                const match = line.match(/^void\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*\(([^)]*)\)\s*{/);
                if (match) {
                    const funcName = match[1];
                    const params = match[2].split(',').map(p => {
                        const parts = p.trim().split(/\s+/);
                        return parts[parts.length - 1];
                    }).filter(p => p);
                    
                    // Находим тело функции
                    let body = '';
                    let braceCount = 1;
                    i++;
                    while (i < lines.length && braceCount > 0) {
                        const currentLine = lines[i];
                        body += currentLine + '\n';
                        for (let ch of currentLine) {
                            if (ch === '{') braceCount++;
                            if (ch === '}') braceCount--;
                        }
                        i++;
                    }
                    
                    // Сохраняем функцию
                    functions[funcName] = { params, body: body.substring(0, body.lastIndexOf('}')) };
                    continue;
                }
            }
            i++;
        }
        
        // Теперь выполняем основной код
        const mainCode = [];
        let inFunction = false;
        
        for (let line of lines) {
            const trimmed = line.trim();
            if (trimmed.startsWith('void ') && trimmed.includes('{')) {
                inFunction = true;
                continue;
            }
            if (inFunction) {
                if (trimmed === '}' || trimmed.endsWith('}')) {
                    inFunction = false;
                }
                continue;
            }
            if (trimmed && !trimmed.startsWith('//')) {
                mainCode.push(line);
            }
        }
        
        // Выполняем основной код построчно
        let idx = 0;
        
        // Вспомогательная функция для выполнения операторов
        async function executeLine(line) {
            line = line.trim();
            if (!line || line.startsWith('//')) return true;
            
            // Объявление переменной int x;
            if (line.match(/^(int|float)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*;$/)) {
                const match = line.match(/^(int|float)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*;$/);
                if (match && vars[match[2]] === undefined) {
                    vars[match[2]] = 0;
                }
                return true;
            }
            
            // Объявление с присваиванием int x = 5;
            if (line.match(/^(int|float)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+);$/)) {
                const match = line.match(/^(int|float)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+);$/);
                if (match) {
                    const value = evaluateExpression(match[3], vars);
                    vars[match[2]] = value;
                }
                return true;
            }
            
            // Присваивание x = 5;
            if (line.match(/^([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+);$/)) {
                const match = line.match(/^([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+);$/);
                if (match) {
                    const value = evaluateExpression(match[2], vars);
                    vars[match[1]] = value;
                }
                return true;
            }
            
            // while (1) или while (true)
            if (line.match(/^while\s*\(\s*1\s*\)\s*{$/)) {
                let loopBody = '';
                let braceCount = 1;
                let j = 0;
                // Находим тело цикла
                while (idx + j < mainCode.length && braceCount > 0) {
                    const nextLine = mainCode[idx + j];
                    loopBody += nextLine + '\n';
                    for (let ch of nextLine) {
                        if (ch === '{') braceCount++;
                        if (ch === '}') braceCount--;
                    }
                    j++;
                }
                // Выполняем цикл
                while (!stopAnimation) {
                    const lines2 = loopBody.split('\n');
                    for (let line2 of lines2) {
                        if (line2.trim() && !line2.trim().startsWith('//') && !line2.trim().startsWith('}')) {
                            await executeLine(line2);
                        }
                    }
                    await delay(10);
                }
                idx += j - 1;
                return true;
            }
            
            // Вызов функции
            if (line.match(/^([a-zA-Z_][a-zA-Z0-9_]*)\s*\(/)) {
                const match = line.match(/^([a-zA-Z_][a-zA-Z0-9_]*)\s*\(([^)]*)\)\s*;$/);
                if (match && functions[match[1]]) {
                    const func = functions[match[1]];
                    const args = match[2].split(',').map(a => evaluateExpression(a.trim(), vars));
                    
                    // Создаём локальные переменные
                    const localVars = {};
                    for (let p = 0; p < func.params.length; p++) {
                        localVars[func.params[p]] = args[p];
                    }
                    
                    // Выполняем тело функции
                    const funcLines = func.body.split('\n');
                    for (let fline of funcLines) {
                        fline = fline.trim();
                        if (!fline || fline.startsWith('//') || fline === '{' || fline === '}') continue;
                        
                        // Объявление локальных переменных
                        if (fline.match(/^(int|float)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*;$/)) {
                            const m = fline.match(/^(int|float)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*;$/);
                            if (m && localVars[m[2]] === undefined) localVars[m[2]] = 0;
                            continue;
                        }
                        if (fline.match(/^(int|float)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+);$/)) {
                            const m = fline.match(/^(int|float)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+);$/);
                            if (m) localVars[m[2]] = evaluateExpression(m[3], localVars);
                            continue;
                        }
                        
                        // Присваивание в функции
                        if (fline.match(/^([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+);$/)) {
                            const m = fline.match(/^([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+);$/);
                            if (m) {
                                const val = evaluateExpression(m[2], localVars);
                                if (localVars[m[1]] !== undefined) localVars[m[1]] = val;
                                else vars[m[1]] = val;
                            }
                            continue;
                        }
                        
                        // gl вызовы в функции
                        if (fline.match(/^gl[A-Z]/)) {
                            await executeGL(fline, localVars);
                            continue;
                        }
                        
                        // for цикл в функции
                        if (fline.startsWith('for')) {
                            await executeFor(fline, localVars);
                            continue;
                        }
                        
                        // if условие
                        if (fline.startsWith('if')) {
                            await executeIf(fline, localVars);
                            continue;
                        }
                    }
                }
                return true;
            }
            
            // GL команды
            if (line.match(/^gl[A-Z]/)) {
                await executeGL(line, vars);
                return true;
            }
            
            // for цикл
            if (line.startsWith('for')) {
                await executeFor(line, vars);
                return true;
            }
            
            // if условие
            if (line.startsWith('if')) {
                await executeIf(line, vars);
                return true;
            }
            
            return true;
        }
        
        async function executeGL(line, context) {
            if (line.startsWith('glColor3f')) {
                const match = line.match(/glColor3f\(([^,]+),([^,]+),([^)]+)\)/);
                if (match) {
                    gl.glColor3f(
                        evaluateExpression(match[1], context),
                        evaluateExpression(match[2], context),
                        evaluateExpression(match[3], context)
                    );
                }
            }
            else if (line.startsWith('glVertex3f')) {
                const match = line.match(/glVertex3f\(([^,]+),([^,]+),([^)]+)\)/);
                if (match) {
                    gl.glVertex3f(
                        evaluateExpression(match[1], context),
                        evaluateExpression(match[2], context),
                        evaluateExpression(match[3], context)
                    );
                }
            }
            else if (line.startsWith('glBegin')) {
                const match = line.match(/glBegin\(([^)]+)\)/);
                if (match) gl.glBegin(match[1]);
            }
            else if (line.startsWith('glEnd')) {
                gl.glEnd();
            }
            else if (line.startsWith('glClear')) {
                gl.glClear();
            }
        }
        
        async function executeFor(line, context) {
            const match = line.match(/for\s*\(\s*([^;]+);\s*([^;]+);\s*([^)]+)\)\s*{/);
            if (match) {
                const init = match[1].trim();
                const condition = match[2].trim();
                const increment = match[3].trim();
                
                // Инициализация
                if (init.match(/^(int|float)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+)$/)) {
                    const m = init.match(/^(int|float)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+)$/);
                    if (m) context[m[2]] = evaluateExpression(m[3], context);
                } else if (init.match(/^([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+)$/)) {
                    const m = init.match(/^([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+)$/);
                    if (m) context[m[1]] = evaluateExpression(m[2], context);
                }
                
                // Находим тело
                let body = '';
                let braceCount = 1;
                let j = 0;
                // ... упрощённо, для демо пропускаем
            }
        }
        
        async function executeIf(line, context) {
            // Упрощённо для демо
        }
        
        function evaluateExpression(expr, context) {
            expr = expr.trim();
            // Подставляем переменные
            for (let key in context) {
                const regex = new RegExp('\\b' + key + '\\b', 'g');
                expr = expr.replace(regex, context[key]);
            }
            // Математические функции
            expr = expr.replace(/cos\(([^)]+)\)/g, 'Math.cos($1)');
            expr = expr.replace(/sin\(([^)]+)\)/g, 'Math.sin($1)');
            expr = expr.replace(/sqrt\(([^)]+)\)/g, 'Math.sqrt($1)');
            
            try {
                return eval(expr);
            } catch(e) {
                return 0;
            }
        }
        
        // Запускаем выполнение
        try {
            while (idx < mainCode.length && !stopAnimation) {
                const line = mainCode[idx];
                await executeLine(line);
                idx++;
            }
            if (!stopAnimation) addSuccess("Анимация завершена");
        } catch(e) {
            addError(e.message);
        }
    }

    document.getElementById('runBtn').addEventListener('click', async () => {
        await runCode(codeArea.value);
    });
    
    copyErrorsBtn.addEventListener('click', () => {
        if (errors.length === 0) {
            alert('Нет ошибок! Круг бегает как надо 👍');
        } else {
            navigator.clipboard.writeText(errors.join('\n'));
            alert(`Скопировано ${errors.length} ошибок`);
        }
    });
    
    // Автозапуск
    setTimeout(() => runCode(codeArea.value), 500);
</script>
</body>
</html>
