<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>C-Style Graphics Playground</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a1e2c;
            margin: 0;
            padding: 20px;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: #0f1219;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .editor-panel {
            flex: 2;
            min-width: 300px;
        }
        .canvas-panel {
            flex: 1;
            min-width: 400px;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 400px;
            background: #0a0c12;
            color: #4c6ef5;
            border: 1px solid #2a2f3f;
            border-radius: 12px;
            padding: 12px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }
        canvas {
            background: #0a0c12;
            border-radius: 12px;
            box-shadow: 0 0 0 2px #2a2f3f;
            width: 100%;
            height: auto;
            cursor: crosshair;
        }
        button {
            background: #4c6ef5;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 40px;
            margin-top: 15px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            width: 100%;
        }
        button:active {
            transform: scale(0.97);
            background: #3b5bdb;
        }
        .output {
            background: #0a0c12;
            color: #a0a4b8;
            border-radius: 12px;
            padding: 10px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 12px;
            max-height: 100px;
            overflow-y: auto;
        }
        .status {
            color: #a0a4b8;
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
        }
        @media (max-width: 800px) {
            .row { flex-direction: column; }
            .canvas-panel { min-width: auto; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row">
        <div class="editor-panel">
            <textarea id="code" placeholder="Введите C-подобный код...">// Пример: рисуем квадрат и линию
int x = 50;
int y = 50;
int size = 60;
rect(x, y, size, size, RGB(100,200,255));
line(0, 0, 399, 399, RED);
point(200, 200, GREEN);
for (int i = 0; i < 5; i++) {
    rect(10 + i*30, 300, 20, 20, RGB(255,100,100));
}</textarea>
        </div>
        <div class="canvas-panel">
            <canvas id="canvas" width="400" height="400"></canvas>
            <button id="runBtn">▶ Запустить код</button>
            <div class="output" id="output">Нажмите "Запустить"</div>
        </div>
    </div>
    <div class="status">C-подобный язык: int, float, if, for, функции рисования point, line, rect, clear, RGB()</div>
</div>

<script>
    // ---------- Telegram WebApp ----------
    let tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
        tg.enableClosingConfirmation();
    }

    // ---------- Canvas и контекст ----------
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const codeArea = document.getElementById('code');
    const outputDiv = document.getElementById('output');

    // Функции рисования (доступны в интерпретаторе)
    const graphics = {
        clear: (color = 'BLACK') => {
            let fillStyle = color;
            if (typeof color === 'string') {
                if (color === 'WHITE') fillStyle = '#ffffff';
                else if (color === 'BLACK') fillStyle = '#0a0c12';
                else if (color === 'RED') fillStyle = '#ff3333';
                else if (color === 'GREEN') fillStyle = '#33ff33';
                else if (color === 'BLUE') fillStyle = '#3333ff';
                else fillStyle = color;
            }
            ctx.fillStyle = fillStyle;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        },
        point: (x, y, color = 'WHITE') => {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 1, 1);
        },
        line: (x1, y1, x2, y2, color = 'WHITE') => {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.stroke();
        },
        rect: (x, y, w, h, color = 'WHITE') => {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        },
        RGB: (r, g, b) => `rgb(${r},${g},${b})`
    };

    // Простой интерпретатор C-подобного синтаксиса (подмножество)
    function runCode(code) {
        // Очищаем вывод
        outputDiv.innerHTML = '';
        // Очищаем canvas
        graphics.clear('BLACK');

        // Переменные окружения
        let vars = {};
        let lastResult = null;

        // Вспомогательная функция для получения значения переменной или числа
        function getValue(expr) {
            expr = expr.trim();
            if (!isNaN(parseFloat(expr)) && isFinite(expr)) return parseFloat(expr);
            if (vars[expr] !== undefined) return vars[expr];
            throw new Error(`Неизвестная переменная: ${expr}`);
        }

        // Разбор строки
        const lines = code.split('\n');
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line === '' || line.startsWith('//')) continue;

            try {
                // Объявление переменной: int x = 5;  или float y = 3.14;
                let declMatch = line.match(/^(int|float)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+);$/);
                if (declMatch) {
                    let type = declMatch[1];
                    let name = declMatch[2];
                    let value = getValue(declMatch[3]);
                    vars[name] = value;
                    outputDiv.innerHTML += `> ${type} ${name} = ${value}<br>`;
                    continue;
                }

                // Присваивание: x = 10;
                let assignMatch = line.match(/^([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+);$/);
                if (assignMatch) {
                    let name = assignMatch[1];
                    let value = getValue(assignMatch[2]);
                    vars[name] = value;
                    outputDiv.innerHTML += `> ${name} = ${value}<br>`;
                    continue;
                }

                // Вызов функции рисования: rect(10,20,30,40,RED);
                let funcMatch = line.match(/^([a-zA-Z_]+)\((.*)\);$/);
                if (funcMatch && graphics[funcMatch[1]]) {
                    let funcName = funcMatch[1];
                    let argsStr = funcMatch[2];
                    let args = [];
                    let current = '';
                    let paren = 0;
                    for (let ch of argsStr) {
                        if (ch === ',' && paren === 0) {
                            args.push(current.trim());
                            current = '';
                        } else {
                            if (ch === '(') paren++;
                            if (ch === ')') paren--;
                            current += ch;
                        }
                    }
                    if (current.trim()) args.push(current.trim());
                    
                    // Преобразуем аргументы в значения
                    let values = [];
                    for (let arg of args) {
                        if (arg.startsWith('RGB(')) {
                            let rgbMatch = arg.match(/RGB\((\d+),(\d+),(\d+)\)/);
                            if (rgbMatch) {
                                values.push(`rgb(${rgbMatch[1]},${rgbMatch[2]},${rgbMatch[3]})`);
                            } else {
                                throw new Error('Ошибка в RGB');
                            }
                        } else if (arg === 'RED') values.push('#ff3333');
                        else if (arg === 'GREEN') values.push('#33ff33');
                        else if (arg === 'BLUE') values.push('#3333ff');
                        else if (arg === 'WHITE') values.push('#ffffff');
                        else if (arg === 'BLACK') values.push('#000000');
                        else {
                            values.push(getValue(arg));
                        }
                    }
                    graphics[funcName](...values);
                    outputDiv.innerHTML += `> ${funcName}(${values.join(', ')})<br>`;
                    continue;
                }

                // if (условие) { ... } (упрощённо, только одна строка внутри)
                let ifMatch = line.match(/^if\s*\((.*)\)\s*{(.*)}$/);
                if (ifMatch) {
                    let condition = ifMatch[1];
                    let body = ifMatch[2].trim();
                    // Простейшая проверка условия
                    let condResult = false;
                    let condParts = condition.split(/([<>]=?|==|!=)/);
                    if (condParts.length === 3) {
                        let left = getValue(condParts[0]);
                        let op = condParts[1];
                        let right = getValue(condParts[2]);
                        if (op === '<') condResult = left < right;
                        else if (op === '>') condResult = left > right;
                        else if (op === '==') condResult = left == right;
                        else if (op === '!=') condResult = left != right;
                        else if (op === '<=') condResult = left <= right;
                        else if (op === '>=') condResult = left >= right;
                    }
                    if (condResult) {
                        // Выполняем тело как отдельную строку кода
                        let fakeLines = [body];
                        // рекурсивно не будем, просто выполним
                        let savedLines = lines.slice(i+1);
                        let savedI = i;
                        // простой способ: вызываем тот же парсер для одной строки
                        if (body) {
                            let tempLines = [body];
                            for (let tl of tempLines) {
                                // очень упрощённо, но для примера хватит
                                let innerMatch = tl.match(/^([a-zA-Z_]+)\((.*)\);$/);
                                if (innerMatch && graphics[innerMatch[1]]) {
                                    let innerFunc = innerMatch[1];
                                    let innerArgs = innerMatch[2].split(',').map(a => a.trim());
                                    let innerValues = innerArgs.map(a => {
                                        if (a.match(/^RGB/)) return eval(a);
                                        return getValue(a);
                                    });
                                    graphics[innerFunc](...innerValues);
                                    outputDiv.innerHTML += `> ${innerFunc}(${innerValues.join(', ')})<br>`;
                                }
                            }
                        }
                    }
                    continue;
                }

                // for (int i=0; i<10; i++) { ... } (упрощённо)
                let forMatch = line.match(/^for\s*\(\s*int\s+([a-zA-Z_]+)\s*=\s*(\d+)\s*;\s*([a-zA-Z_]+)\s*([<>]=?|==|!=)\s*(\d+)\s*;\s*([a-zA-Z_]+)(\+\+|--)\s*\)\s*{(.*)}$/);
                if (forMatch) {
                    let varName = forMatch[1];
                    let start = parseInt(forMatch[2]);
                    let leftVar = forMatch[3];
                    let op = forMatch[4];
                    let end = parseInt(forMatch[5]);
                    let incVar = forMatch[6];
                    let incOp = forMatch[7];
                    let body = forMatch[8].trim();
                    vars[varName] = start;
                    let condition = (a, b) => {
                        if (op === '<') return a < b;
                        if (op === '>') return a > b;
                        if (op === '<=') return a <= b;
                        if (op === '>=') return a >= b;
                        if (op === '==') return a == b;
                        if (op === '!=') return a != b;
                        return false;
                    };
                    while (condition(vars[varName], end)) {
                        // выполняем тело
                        let bodyLines = body.split(';');
                        for (let bl of bodyLines) {
                            bl = bl.trim();
                            if (bl === '') continue;
                            let innerMatch = bl.match(/^([a-zA-Z_]+)\((.*)\)$/);
                            if (innerMatch && graphics[innerMatch[1]]) {
                                let innerFunc = innerMatch[1];
                                let innerArgs = innerMatch[2].split(',').map(a => a.trim());
                                let innerValues = innerArgs.map(a => {
                                    if (a.match(/^RGB/)) return eval(a);
                                    return getValue(a);
                                });
                                graphics[innerFunc](...innerValues);
                                outputDiv.innerHTML += `> ${innerFunc}(${innerValues.join(', ')})<br>`;
                            }
                        }
                        if (incOp === '++') vars[varName]++;
                        else if (incOp === '--') vars[varName]--;
                    }
                    continue;
                }

                // Если ничего не подошло
                if (line && !line.startsWith('//')) {
                    outputDiv.innerHTML += `<span style="color: #ff6b6b;">⚠️ Неизвестная команда: ${line}</span><br>`;
                }
            } catch(e) {
                outputDiv.innerHTML += `<span style="color: #ff6b6b;">⚠️ Ошибка в строке ${i+1}: ${e.message}</span><br>`;
            }
        }
    }

    // Запуск по кнопке
    document.getElementById('runBtn').addEventListener('click', () => {
        runCode(codeArea.value);
    });

    // При загрузке запускаем пример
    runCode(codeArea.value);
</script>
</body>
</html>
