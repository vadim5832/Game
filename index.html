<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OpenGL - Анимация круга</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #1a1e2c; margin: 0; padding: 20px; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 1200px; width: 100%; background: #0f1219; border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .row { display: flex; gap: 20px; flex-wrap: wrap; }
        .editor-panel { flex: 2; min-width: 300px; }
        .canvas-panel { flex: 1; min-width: 400px; text-align: center; }
        textarea { width: 100%; height: 450px; background: #0a0c12; color: #4c6ef5; border: 1px solid #2a2f3f; border-radius: 12px; padding: 12px; font-family: monospace; font-size: 13px; resize: vertical; }
        canvas { background: #0a0c12; border-radius: 12px; box-shadow: 0 0 0 2px #2a2f3f; width: 100%; height: auto; cursor: crosshair; }
        button { background: #4c6ef5; border: none; color: white; font-size: 18px; font-weight: bold; padding: 10px 25px; border-radius: 40px; margin-top: 15px; cursor: pointer; width: 100%; }
        button:active { transform: scale(0.97); background: #3b5bdb; }
        .output { background: #0a0c12; color: #a0a4b8; border-radius: 12px; padding: 10px; margin-top: 15px; font-family: monospace; font-size: 12px; max-height: 100px; overflow-y: auto; text-align: left; }
        .copy-btn { background: #2a2f3f; margin-top: 8px; font-size: 14px; padding: 6px 12px; width: auto; }
        .error-line { color: #ff6b6b; white-space: pre-wrap; }
        .status { color: #a0a4b8; margin-top: 10px; font-size: 12px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="row">
        <div class="editor-panel">
            <textarea id="code">// Шахматная доска
void drawBoard() {
    int x;
    int y;
    for (y = 0; y < 8; y = y + 1) {
        for (x = 0; x < 8; x = x + 1) {
            if ((x + y) % 2 == 0) {
                glColor3f(0.2, 0.2, 0.2);
            } else {
                glColor3f(0.9, 0.9, 0.9);
            }
            glBegin(GL_QUADS);
                glVertex3f(x * 50.0, y * 50.0, 0.0);
                glVertex3f(x * 50.0 + 50.0, y * 50.0, 0.0);
                glVertex3f(x * 50.0 + 50.0, y * 50.0 + 50.0, 0.0);
                glVertex3f(x * 50.0, y * 50.0 + 50.0, 0.0);
            glEnd();
        }
    }
}

// Рисование круга
void drawCircle(float cx, float cy, float r, float red, float green, float blue) {
    glColor3f(red, green, blue);
    glBegin(GL_TRIANGLE_FAN);
        glVertex3f(cx, cy, 0.0);
        int i;
        for (i = 0; i <= 36; i = i + 1) {
            float angle = i * 10.0 * 3.14159 / 180.0;
            glVertex3f(cx + r * cos(angle), cy + r * sin(angle), 0.0);
        }
    glEnd();
}

// Анимация
float posX;
float speed;
int direction;

posX = 50.0;
speed = 3.0;
direction = 1;

while (1) {
    glClear();
    drawBoard();
    
    posX = posX + speed * direction;
    
    if (posX > 350.0) {
        posX = 350.0;
        direction = -1;
    }
    if (posX < 50.0) {
        posX = 50.0;
        direction = 1;
    }
    
    drawCircle(posX, 300.0, 20.0, 1.0, 0.0, 0.0);
    delay(30);
}</textarea>
        </div>
        <div class="canvas-panel">
            <canvas id="canvas" width="400" height="400"></canvas>
            <button id="runBtn">▶ Запустить код</button>
            <div class="output" id="output">Нажмите "Запустить"</div>
            <button id="copyErrorsBtn" class="copy-btn">📋 Копировать ошибки</button>
        </div>
    </div>
    <div class="status">🔴 Меняй speed в коде, нажимай "Запустить" — скорость сразу меняется</div>
</div>

<script>
    let tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const codeArea = document.getElementById('code');
    const outputDiv = document.getElementById('output');
    const copyErrorsBtn = document.getElementById('copyErrorsBtn');
    let errors = [];
    let currentAnimation = null;
    let shouldStop = false;

    function clearOutput() { 
        outputDiv.innerHTML = ''; 
        errors = []; 
    }
    
    function addError(msg) { 
        errors.push(msg); 
        outputDiv.innerHTML += `<div class="error-line">⚠️ ${escapeHtml(msg)}</div>`; 
    }
    
    function addSuccess(msg) {
        outputDiv.innerHTML += `<div style="color: #6cff8e;">✅ ${escapeHtml(msg)}</div>`;
    }
    
    function escapeHtml(str) { 
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); 
    }

    // GL контекст
    let currentColor = { r: 1, g: 1, b: 1 };
    let vertices = [];
    let currentMode = null;
    let inBegin = false;

    function rgbToStyle(r,g,b) { 
        return `rgb(${Math.floor(r*255)}, ${Math.floor(g*255)}, ${Math.floor(b*255)})`; 
    }

    function drawTriangles() {
        if (vertices.length < 3) return;
        for (let i = 0; i <= vertices.length - 3; i += 3) {
            ctx.beginPath();
            ctx.moveTo(vertices[i].x, vertices[i].y);
            ctx.lineTo(vertices[i+1].x, vertices[i+1].y);
            ctx.lineTo(vertices[i+2].x, vertices[i+2].y);
            ctx.closePath();
            ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
            ctx.fill();
        }
    }

    function drawQuads() {
        if (vertices.length < 4) return;
        for (let i = 0; i <= vertices.length - 4; i += 4) {
            ctx.beginPath();
            ctx.moveTo(vertices[i].x, vertices[i].y);
            ctx.lineTo(vertices[i+1].x, vertices[i+1].y);
            ctx.lineTo(vertices[i+2].x, vertices[i+2].y);
            ctx.lineTo(vertices[i+3].x, vertices[i+3].y);
            ctx.closePath();
            ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
            ctx.fill();
        }
    }

    function drawTriangleFan() {
        if (vertices.length < 2) return;
        let first = vertices[0];
        for (let i = 1; i < vertices.length - 1; i++) {
            ctx.beginPath();
            ctx.moveTo(first.x, first.y);
            ctx.lineTo(vertices[i].x, vertices[i].y);
            ctx.lineTo(vertices[i+1].x, vertices[i+1].y);
            ctx.closePath();
            ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
            ctx.fill();
        }
    }

    function flush() {
        if (vertices.length === 0) return;
        switch(currentMode) {
            case 'GL_TRIANGLES': drawTriangles(); break;
            case 'GL_QUADS': drawQuads(); break;
            case 'GL_TRIANGLE_FAN': drawTriangleFan(); break;
        }
        vertices = [];
    }

    const gl = {
        glColor3f: (r,g,b) => { currentColor = { r, g, b }; },
        glVertex3f: (x,y,z) => { 
            if (!inBegin) throw new Error("glVertex3f вне glBegin/glEnd"); 
            vertices.push({ x, y }); 
        },
        glBegin: (mode) => { 
            if (inBegin) throw new Error("glBegin уже вызван");
            inBegin = true; 
            currentMode = mode;
            vertices = [];
        },
        glEnd: () => { 
            if (!inBegin) throw new Error("glEnd без glBegin");
            flush();
            inBegin = false;
            currentMode = null;
        },
        glClear: () => { 
            ctx.fillStyle = '#0a0c12'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height); 
        }
    };

    function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    // Компилятор
    async function runCode(code) {
        // Останавливаем старую анимацию
        if (currentAnimation) {
            shouldStop = true;
            await delay(100);
        }
        
        shouldStop = false;
        clearOutput();
        gl.glClear();
        
        currentColor = { r: 1, g: 1, b: 1 };
        vertices = [];
        inBegin = false;
        currentMode = null;
        
        let jsCode = code;
        
        // Убираем комментарии
        jsCode = jsCode.replace(/\/\/[^\n]*/g, '');
        
        // Функции
        jsCode = jsCode.replace(/void\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*\(([^)]*)\)\s*\{/g, (match, name, params) => {
            let cleanParams = params.split(',').map(p => {
                p = p.trim();
                if (!p) return '';
                let parts = p.split(/\s+/);
                return parts[parts.length - 1];
            }).filter(p => p).join(', ');
            return `function ${name}(${cleanParams}) {`;
        });
        
        // Переменные
        jsCode = jsCode.replace(/\b(int|float)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=/g, 'let $2 =');
        jsCode = jsCode.replace(/\b(int|float)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*;/g, 'let $2;');
        
        // for
        jsCode = jsCode.replace(/for\s*\(\s*(int|float)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=/g, 'for (let $2 =');
        
        // Инкремент
        jsCode = jsCode.replace(/([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*\1\s*\+\s*1/g, '$1++');
        jsCode = jsCode.replace(/([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*\1\s*-\s*1/g, '$1--');
        
        // while
        jsCode = jsCode.replace(/while\s*\(\s*1\s*\)/g, 'while (true)');
        
        // delay
        jsCode = jsCode.replace(/delay\s*\(\s*(\d+)\s*\)\s*;/g, 'await delay($1);');
        
        // GL константы
        jsCode = jsCode.replace(/\bGL_TRIANGLES\b/g, '"GL_TRIANGLES"');
        jsCode = jsCode.replace(/\bGL_QUADS\b/g, '"GL_QUADS"');
        jsCode = jsCode.replace(/\bGL_TRIANGLE_FAN\b/g, '"GL_TRIANGLE_FAN"');
        
        // GL функции
        jsCode = jsCode.replace(/\bglColor3f\s*\(/g, 'gl.glColor3f(');
        jsCode = jsCode.replace(/\bglVertex3f\s*\(/g, 'gl.glVertex3f(');
        jsCode = jsCode.replace(/\bglBegin\s*\(/g, 'gl.glBegin(');
        jsCode = jsCode.replace(/\bglEnd\s*\(/g, 'gl.glEnd(');
        jsCode = jsCode.replace(/\bglClear\s*\(/g, 'gl.glClear(');
        
        // Математика
        jsCode = jsCode.replace(/\bcos\s*\(/g, 'Math.cos(');
        jsCode = jsCode.replace(/\bsin\s*\(/g, 'Math.sin(');
        
        // Добавляем проверку на остановку
        jsCode = `(async function() {
            let shouldStop = false;
            const checkStop = () => { if (window.__shouldStop) throw new Error("STOP"); };
            ${jsCode}
        })()`;
        
        try {
            window.__shouldStop = false;
            const func = new Function('gl', 'delay', 'Math', 'window', jsCode);
            currentAnimation = func(gl, delay, Math, window);
            await currentAnimation;
            if (!shouldStop) {
                addSuccess("✅ Анимация запущена! Меняй speed в коде и жми Запустить");
            }
        } catch (e) {
            if (e.message !== "STOP") {
                addError("Ошибка: " + e.message);
            }
        }
    }

    document.getElementById('runBtn').addEventListener('click', async () => {
        await runCode(codeArea.value);
    });
    
    copyErrorsBtn.addEventListener('click', () => {
        if (errors.length === 0) {
            alert('✅ Нет ошибок!');
        } else {
            navigator.clipboard.writeText(errors.join('\n'));
            alert(`📋 Скопировано ${errors.length} ошибок`);
        }
    });
    
    // Автозапуск
    setTimeout(() => {
        runCode(codeArea.value);
    }, 500);
</script>
</body>
</html>
