<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>C-Style OpenGL Graphics</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #1a1e2c; margin: 0; padding: 20px; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 1200px; width: 100%; background: #0f1219; border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .row { display: flex; gap: 20px; flex-wrap: wrap; }
        .editor-panel { flex: 2; min-width: 300px; }
        .canvas-panel { flex: 1; min-width: 400px; text-align: center; }
        textarea { width: 100%; height: 400px; background: #0a0c12; color: #4c6ef5; border: 1px solid #2a2f3f; border-radius: 12px; padding: 12px; font-family: monospace; font-size: 14px; resize: vertical; }
        canvas { background: #0a0c12; border-radius: 12px; box-shadow: 0 0 0 2px #2a2f3f; width: 100%; height: auto; cursor: crosshair; }
        button { background: #4c6ef5; border: none; color: white; font-size: 18px; font-weight: bold; padding: 10px 25px; border-radius: 40px; margin-top: 15px; cursor: pointer; width: 100%; }
        button:active { transform: scale(0.97); background: #3b5bdb; }
        .output { background: #0a0c12; color: #a0a4b8; border-radius: 12px; padding: 10px; margin-top: 15px; font-family: monospace; font-size: 12px; max-height: 100px; overflow-y: auto; text-align: left; }
        .copy-btn { background: #2a2f3f; margin-top: 8px; font-size: 14px; padding: 6px 12px; width: auto; }
        .error-line { color: #ff6b6b; white-space: pre-wrap; }
        .status { color: #a0a4b8; margin-top: 10px; font-size: 12px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="row">
        <div class="editor-panel">
            <textarea id="code">// C-стиль OpenGL код
int i;
for (i = 0; i < 10; i = i + 1) {
    float x = i * 40.0;
    float y = 200.0;
    color(1.0, 0.2, 0.5);
    begin();
        vertex(x, y);
        vertex(x + 30.0, y);
        vertex(x + 15.0, y + 30.0);
    end();
}

color(0.2, 0.8, 0.3);
begin();
    vertex(50.0, 50.0);
    vertex(350.0, 50.0);
    vertex(200.0, 350.0);
end();

color(1.0, 1.0, 0.0);
begin();
    vertex(300.0, 300.0);
    vertex(380.0, 300.0);
    vertex(340.0, 380.0);
end();</textarea>
        </div>
        <div class="canvas-panel">
            <canvas id="canvas" width="400" height="400"></canvas>
            <button id="runBtn">▶ Запустить код</button>
            <div class="output" id="output">Нажмите "Запустить"</div>
            <button id="copyErrorsBtn" class="copy-btn">📋 Копировать ошибки</button>
        </div>
    </div>
    <div class="status">C-подобный синтаксис: int, float, for, if, while, color(r,g,b), begin(), vertex(x,y), end()</div>
</div>

<script>
    let tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const codeArea = document.getElementById('code');
    const outputDiv = document.getElementById('output');
    const copyErrorsBtn = document.getElementById('copyErrorsBtn');
    let errors = [];

    function clearOutput() { outputDiv.innerHTML = ''; errors = []; }
    function addError(msg) { errors.push(msg); outputDiv.innerHTML += `<div class="error-line">⚠️ ${escapeHtml(msg)}</div>`; }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

    // OpenGL-подобное состояние
    let currentColor = { r: 1, g: 1, b: 1 };
    let vertices = [];
    let inBegin = false;

    function rgbToStyle(r,g,b) { return `rgb(${Math.floor(r*255)}, ${Math.floor(g*255)}, ${Math.floor(b*255)})`; }
    function flushVertices() {
        if (vertices.length < 3) return;
        ctx.beginPath();
        ctx.moveTo(vertices[0].x, vertices[0].y);
        for (let i = 1; i < vertices.length; i++) ctx.lineTo(vertices[i].x, vertices[i].y);
        ctx.closePath();
        ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
        ctx.fill();
        vertices = [];
    }

    const gl = {
        color: (r,g,b) => { currentColor = { r, g, b }; },
        begin: () => { if (inBegin) throw new Error("begin() already called"); inBegin = true; vertices = []; },
        vertex: (x,y) => { if (!inBegin) throw new Error("vertex() outside begin/end"); vertices.push({ x, y }); },
        end: () => { if (!inBegin) throw new Error("end() without begin"); flushVertices(); inBegin = false; },
        clear: (r,g,b) => { ctx.fillStyle = rgbToStyle(r,g,b); ctx.fillRect(0,0,canvas.width,canvas.height); }
    };

    function runCode(code) {
        clearOutput();
        gl.clear(0,0,0);
        currentColor = { r:1,g:1,b:1 };
        vertices = [];
        inBegin = false;

        // Преобразуем C-подобный синтаксис в JavaScript
        let jsCode = code
            // Объявления переменных: int x = 5; -> let x = 5;
            .replace(/\bint\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*([^;]+);/g, 'let $1 = $2;')
            .replace(/\bfloat\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*([^;]+);/g, 'let $1 = $2;')
            // Циклы for: for (i = 0; i < 10; i = i + 1) -> for (let i = 0; i < 10; i = i + 1)
            .replace(/for\s*\(\s*([a-zA-Z_][a-zA-Z0-9_]*)\s*=/g, 'for (let $1 =')
            // Вызовы функций: color(1,0,0); -> gl.color(1,0,0);
            .replace(/\b(color|begin|vertex|end|clear)\s*\(/g, 'gl.$1(')
            // Убираем точки с запятой в конце строк (они не обязательны)
            .replace(/;\s*$/gm, '');

        try {
            // Создаём функцию с доступом к gl
            const func = new Function('gl', jsCode);
            func(gl);
        } catch(e) {
            addError(e.message);
        }
    }

    document.getElementById('runBtn').addEventListener('click', () => runCode(codeArea.value));
    copyErrorsBtn.addEventListener('click', () => {
        if (errors.length === 0) alert('Нет ошибок');
        else navigator.clipboard.writeText(errors.join('\n')).then(() => alert(`Скопировано ${errors.length} ошибок`));
    });
    runCode(codeArea.value);
</script>
</body>
</html>
