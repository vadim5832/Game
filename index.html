<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OpenGL Compiler - Рабочая версия</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #2d2d30;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', 'Consolas', monospace;
            min-height: 100vh;
        }
        
        .ide-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        .toolbar {
            background: #2d2d30;
            padding: 10px 15px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #3e3e42;
            flex-wrap: wrap;
        }
        
        .toolbar button {
            background: #0e639c;
            border: none;
            color: white;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: monospace;
        }
        
        .toolbar button:hover {
            background: #1177bb;
            transform: scale(1.02);
        }
        
        .toolbar .save-btn {
            background: #2b7a3e;
        }
        
        .status-bar {
            background: #007acc;
            color: white;
            padding: 4px 15px;
            font-size: 12px;
            font-family: monospace;
            display: flex;
            justify-content: space-between;
        }
        
        .main-content {
            display: flex;
            gap: 0;
            min-height: 550px;
        }
        
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #3e3e42;
        }
        
        .panel-header {
            background: #252526;
            padding: 8px 15px;
            color: #cccccc;
            font-size: 12px;
            font-weight: bold;
            border-bottom: 1px solid #3e3e42;
            font-family: monospace;
        }
        
        textarea {
            flex: 1;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            resize: none;
            outline: none;
            line-height: 1.5;
        }
        
        .output-panel {
            width: 350px;
            background: #1e1e1e;
            display: flex;
            flex-direction: column;
        }
        
        .output-area {
            flex: 1;
            background: #1e1e1e;
            color: #cccccc;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        
        .error-text { color: #f48771; }
        .success-text { color: #6a9955; }
        .info-text { color: #9cdcfe; }
        
        .animation-window {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2d2d30;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            z-index: 1000;
            border: 2px solid #4c6ef5;
            display: none;
        }
        
        .animation-window.show {
            display: block;
        }
        
        .window-titlebar {
            background: #3e3e42;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 10px 10px 0 0;
            cursor: move;
        }
        
        .window-title {
            color: white;
            font-family: monospace;
            font-weight: bold;
        }
        
        .window-close {
            background: #e81123;
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }
        
        .window-content {
            padding: 20px;
            background: #0a0c12;
            border-radius: 0 0 12px 12px;
            text-align: center;
        }
        
        .animation-canvas {
            background: #0a0c12;
            border-radius: 8px;
            box-shadow: 0 0 0 2px #4c6ef5;
            width: 400px;
            height: 400px;
            display: block;
            margin: 0 auto;
        }
        
        .window-controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .window-controls button {
            background: #4c6ef5;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 999;
            display: none;
        }
        
        .overlay.show {
            display: block;
        }
    </style>
</head>
<body>
<div class="ide-container">
    <div class="toolbar">
        <button id="compileBtn">▶ Компилировать и запустить (F5)</button>
        <button id="saveBtn" class="save-btn">💾 Сохранить HTML</button>
    </div>
    <div class="status-bar">
        <span>📁 OpenGL Project</span>
        <span id="statusText">Готов к компиляции</span>
    </div>
    <div class="main-content">
        <div class="editor-panel">
            <div class="panel-header">📝 Редактор кода (C-подобный синтаксис)</div>
            <textarea id="code">// Шахматная доска
function drawBoard() {
    for (let y = 0; y < 8; y++) {
        for (let x = 0; x < 8; x++) {
            if ((x + y) % 2 == 0) {
                glColor3f(0.2, 0.2, 0.2);
            } else {
                glColor3f(0.9, 0.9, 0.9);
            }
            glBegin("GL_QUADS");
                glVertex3f(x * 50, y * 50, 0);
                glVertex3f(x * 50 + 50, y * 50, 0);
                glVertex3f(x * 50 + 50, y * 50 + 50, 0);
                glVertex3f(x * 50, y * 50 + 50, 0);
            glEnd();
        }
    }
}

// Рисование круга
function drawCircle(cx, cy, r, red, green, blue) {
    glColor3f(red, green, blue);
    glBegin("GL_TRIANGLE_FAN");
        glVertex3f(cx, cy, 0);
        for (let i = 0; i <= 36; i++) {
            let angle = i * 10 * Math.PI / 180;
            glVertex3f(cx + r * Math.cos(angle), cy + r * Math.sin(angle), 0);
        }
    glEnd();
}

// Рисование квадрата
function drawSquare(cx, cy, size, red, green, blue) {
    glColor3f(red, green, blue);
    glBegin("GL_QUADS");
        glVertex3f(cx, cy, 0);
        glVertex3f(cx + size, cy, 0);
        glVertex3f(cx + size, cy + size, 0);
        glVertex3f(cx, cy + size, 0);
    glEnd();
}

// Анимация
let posX = 50;
let speed = 3;
let direction = 1;

async function animate() {
    while (true) {
        glClear();
        drawBoard();
        
        posX = posX + speed * direction;
        
        if (posX > 350) {
            posX = 350;
            direction = -1;
        }
        if (posX < 50) {
            posX = 50;
            direction = 1;
        }
        
        // Рисуем синий квадрат слева
        drawSquare(posX - 45, 295, 30, 0.2, 0.4, 0.8);
        // Рисуем зеленый квадрат справа
        drawSquare(posX + 35, 295, 30, 0.2, 0.8, 0.2);
        
        await delay(30);
    }
}

animate();</textarea>
        </div>
        <div class="output-panel">
            <div class="panel-header">📟 Вывод компиляции</div>
            <div class="output-area" id="output">
                > Готов к компиляции<br>
                > Нажми F5 для запуска<br>
                > Код выполняется напрямую из редактора!
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="animation-window" id="animationWindow">
    <div class="window-titlebar" id="windowTitlebar">
        <span class="window-title">🎮 OpenGL Анимация</span>
        <button class="window-close" id="windowCloseBtn">✕</button>
    </div>
    <div class="window-content">
        <canvas id="animationCanvas" width="400" height="400" class="animation-canvas"></canvas>
        <div class="window-controls">
            <button id="stopAnimBtn">⏹ Остановить</button>
            <button id="restartBtn">🔄 Перезапустить</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('animationCanvas');
    const ctx = canvas.getContext('2d');
    const outputDiv = document.getElementById('output');
    const statusText = document.getElementById('statusText');
    const codeArea = document.getElementById('code');
    const compileBtn = document.getElementById('compileBtn');
    const saveBtn = document.getElementById('saveBtn');
    const animationWindow = document.getElementById('animationWindow');
    const overlay = document.getElementById('overlay');
    const windowCloseBtn = document.getElementById('windowCloseBtn');
    const stopAnimBtn = document.getElementById('stopAnimBtn');
    const restartBtn = document.getElementById('restartBtn');
    
    let animationRunning = false;
    let animationController = null;
    
    // OpenGL эмуляция
    let currentColor = { r: 1, g: 1, b: 1 };
    let vertices = [];
    let currentMode = null;
    let inBegin = false;
    
    function rgbToStyle(r,g,b) { 
        return `rgb(${Math.floor(r*255)}, ${Math.floor(g*255)}, ${Math.floor(b*255)})`; 
    }
    
    function drawTriangles() {
        if (vertices.length < 3) return;
        for (let i = 0; i <= vertices.length - 3; i += 3) {
            ctx.beginPath();
            ctx.moveTo(vertices[i].x, vertices[i].y);
            ctx.lineTo(vertices[i+1].x, vertices[i+1].y);
            ctx.lineTo(vertices[i+2].x, vertices[i+2].y);
            ctx.closePath();
            ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
            ctx.fill();
        }
    }
    
    function drawQuads() {
        if (vertices.length < 4) return;
        for (let i = 0; i <= vertices.length - 4; i += 4) {
            ctx.beginPath();
            ctx.moveTo(vertices[i].x, vertices[i].y);
            ctx.lineTo(vertices[i+1].x, vertices[i+1].y);
            ctx.lineTo(vertices[i+2].x, vertices[i+2].y);
            ctx.lineTo(vertices[i+3].x, vertices[i+3].y);
            ctx.closePath();
            ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
            ctx.fill();
        }
    }
    
    function drawTriangleFan() {
        if (vertices.length < 2) return;
        let first = vertices[0];
        for (let i = 1; i < vertices.length - 1; i++) {
            ctx.beginPath();
            ctx.moveTo(first.x, first.y);
            ctx.lineTo(vertices[i].x, vertices[i].y);
            ctx.lineTo(vertices[i+1].x, vertices[i+1].y);
            ctx.closePath();
            ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
            ctx.fill();
        }
    }
    
    function flush() {
        if (vertices.length === 0) return;
        switch(currentMode) {
            case 'GL_TRIANGLES': drawTriangles(); break;
            case 'GL_QUADS': drawQuads(); break;
            case 'GL_TRIANGLE_FAN': drawTriangleFan(); break;
        }
        vertices = [];
    }
    
    const gl = {
        glColor3f: (r,g,b) => { currentColor = { r, g, b }; },
        glVertex3f: (x,y,z) => { 
            if (!inBegin) throw new Error("glVertex3f вне glBegin/glEnd"); 
            vertices.push({ x, y }); 
        },
        glBegin: (mode) => { 
            if (inBegin) throw new Error("glBegin уже вызван");
            inBegin = true; 
            currentMode = mode;
            vertices = [];
        },
        glEnd: () => { 
            if (!inBegin) throw new Error("glEnd без glBegin");
            flush();
            inBegin = false;
            currentMode = null;
        },
        glClear: () => { 
            ctx.fillStyle = '#0a0c12'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height); 
        }
    };
    
    function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }
    
    function addOutput(msg, type = "info") {
        const colors = { error: "error-text", success: "success-text", info: "info-text" };
        outputDiv.innerHTML += `<div class="${colors[type]}">> ${escapeHtml(msg)}</div>`;
        outputDiv.scrollTop = outputDiv.scrollHeight;
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function clearOutput() {
        outputDiv.innerHTML = '';
    }
    
    async function runUserCode() {
        const code = codeArea.value;
        
        // Создаем изолированную среду с gl и delay
        const sandbox = {
            gl: gl,
            delay: delay,
            Math: Math,
            console: {
                log: (...args) => addOutput(args.join(' '), 'info')
            }
        };
        
        // Добавляем глобальные функции в sandbox
        const funcBody = `
            const gl = this.gl;
            const delay = this.delay;
            const Math = this.Math;
            const console = this.console;
            
            ${code}
        `;
        
        try {
            const AsyncFunction = Object.getPrototypeOf(async function(){}).constructor;
            const userFunc = new AsyncFunction('sandbox', funcBody);
            await userFunc(sandbox);
            return true;
        } catch (err) {
            addOutput(`❌ Ошибка выполнения: ${err.message}`, "error");
            console.error(err);
            return false;
        }
    }
    
    async function startAnimation() {
        if (animationRunning) {
            addOutput("⚠️ Анимация уже запущена", "info");
            return;
        }
        
        clearOutput();
        addOutput("🚀 Запуск пользовательского кода...", "info");
        statusText.innerText = "Выполнение...";
        
        animationRunning = true;
        
        try {
            await runUserCode();
            addOutput("✅ Выполнение завершено", "success");
            statusText.innerText = "Выполнение завершено";
        } catch (err) {
            addOutput(`❌ Ошибка: ${err.message}`, "error");
            statusText.innerText = "Ошибка выполнения";
        } finally {
            animationRunning = false;
        }
    }
    
    function stopAnimation() {
        addOutput("⏹ Остановка анимации (обновите окно для полной остановки)", "info");
        statusText.innerText = "Анимация остановлена";
        // Просто перерисовываем черный экран
        ctx.fillStyle = '#0a0c12';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    
    function restartAnimation() {
        stopAnimation();
        setTimeout(() => {
            startAnimation();
        }, 100);
    }
    
    async function compileAndRun() {
        animationWindow.classList.add('show');
        overlay.classList.add('show');
        await startAnimation();
    }
    
    function closeWindow() {
        stopAnimation();
        animationWindow.classList.remove('show');
        overlay.classList.remove('show');
        statusText.innerText = "Окно закрыто";
    }
    
    function saveHTML() {
        const html = document.documentElement.outerHTML;
        const blob = new Blob([html], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'opengl_program.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        addOutput("💾 Файл сохранен как opengl_program.html", "success");
    }
    
    compileBtn.addEventListener('click', compileAndRun);
    saveBtn.addEventListener('click', saveHTML);
    windowCloseBtn.addEventListener('click', closeWindow);
    stopAnimBtn.addEventListener('click', stopAnimation);
    restartBtn.addEventListener('click', restartAnimation);
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'F5') {
            e.preventDefault();
            compileAndRun();
        }
    });
    
    // Перетаскивание окна
    let isDragging = false;
    let dragOffsetX = 0, dragOffsetY = 0;
    const titlebar = document.getElementById('windowTitlebar');
    titlebar.addEventListener('mousedown', (e) => {
        isDragging = true;
        const rect = animationWindow.getBoundingClientRect();
        dragOffsetX = e.clientX - rect.left;
        dragOffsetY = e.clientY - rect.top;
        animationWindow.style.cursor = 'grabbing';
        e.preventDefault();
    });
    
    document.addEventListener('mousemove', (e) => {
        if (isDragging) {
            animationWindow.style.left = (e.clientX - dragOffsetX) + 'px';
            animationWindow.style.top = (e.clientY - dragOffsetY) + 'px';
            animationWindow.style.transform = 'none';
        }
    });
    
    document.addEventListener('mouseup', () => {
        isDragging = false;
        animationWindow.style.cursor = '';
    });
    
    addOutput("🎮 OpenGL эмулятор готов", "success");
    addOutput("📝 Твой код из редактора выполняется напрямую!", "success");
    addOutput("💡 Можешь убрать drawCircle - круг исчезнет", "info");
    addOutput("💡 Используй JavaScript синтаксис (function, let, const)", "info");
</script>
</body>
</html>
