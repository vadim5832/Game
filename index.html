<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>C / OpenGL 1.3 Style Graphics</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a1e2c;
            margin: 0;
            padding: 20px;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: #0f1219;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .editor-panel {
            flex: 2;
            min-width: 300px;
        }
        .canvas-panel {
            flex: 1;
            min-width: 400px;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 400px;
            background: #0a0c12;
            color: #4c6ef5;
            border: 1px solid #2a2f3f;
            border-radius: 12px;
            padding: 12px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }
        canvas {
            background: #0a0c12;
            border-radius: 12px;
            box-shadow: 0 0 0 2px #2a2f3f;
            width: 100%;
            height: auto;
            cursor: crosshair;
        }
        button {
            background: #4c6ef5;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 40px;
            margin-top: 15px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            width: 100%;
        }
        button:active {
            transform: scale(0.97);
            background: #3b5bdb;
        }
        .output {
            background: #0a0c12;
            color: #a0a4b8;
            border-radius: 12px;
            padding: 10px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 12px;
            max-height: 100px;
            overflow-y: auto;
            text-align: left;
        }
        .status {
            color: #a0a4b8;
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row">
        <div class="editor-panel">
            <textarea id="code">// OpenGL 1.3 стиль рисования
int i;
for (i = 0; i < 10; i = i + 1) {
    float x = i * 40.0;
    float y = 200.0;
    glColor3f(1.0, 0.2, 0.5);
    glBegin();
        glVertex2f(x, y);
        glVertex2f(x + 30.0, y);
        glVertex2f(x + 15.0, y + 30.0);
    glEnd();
}

glColor3f(0.2, 0.8, 0.3);
glBegin();
    glVertex2f(50.0, 50.0);
    glVertex2f(350.0, 50.0);
    glVertex2f(200.0, 350.0);
glEnd();

glColor3f(1.0, 1.0, 0.0);
glBegin();
    glVertex2f(300.0, 300.0);
    glVertex2f(380.0, 300.0);
    glVertex2f(340.0, 380.0);
glEnd();</textarea>
        </div>
        <div class="canvas-panel">
            <canvas id="canvas" width="400" height="400"></canvas>
            <button id="runBtn">▶ Запустить код</button>
            <div class="output" id="output">Нажмите "Запустить"</div>
        </div>
    </div>
    <div class="status">C-подобный синтаксис: int, float, if, for, while, glColor3f(r,g,b), glVertex2f(x,y), glBegin(), glEnd()</div>
</div>

<script>
    // Telegram WebApp
    let tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
    }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const codeArea = document.getElementById('code');
    const outputDiv = document.getElementById('output');

    // Состояние OpenGL-подобного рендеринга
    let currentColor = { r: 1.0, g: 1.0, b: 1.0 };
    let vertices = [];
    let inBegin = false;

    function rgbToStyle(r,g,b) {
        return `rgb(${Math.floor(r*255)}, ${Math.floor(g*255)}, ${Math.floor(b*255)})`;
    }

    function clearCanvas() {
        ctx.fillStyle = '#0a0c12';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function flushVertices() {
        if (vertices.length < 3) {
            vertices = [];
            return;
        }
        ctx.beginPath();
        ctx.moveTo(vertices[0].x, vertices[0].y);
        for (let i = 1; i < vertices.length; i++) {
            ctx.lineTo(vertices[i].x, vertices[i].y);
        }
        ctx.closePath();
        ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
        ctx.fill();
        vertices = [];
    }

    // Доступные функции для интерпретатора
    const glFunctions = {
        glColor3f: (r,g,b) => {
            currentColor = { r: parseFloat(r), g: parseFloat(g), b: parseFloat(b) };
        },
        glVertex2f: (x,y) => {
            if (!inBegin) throw new Error("glVertex вне glBegin/glEnd");
            vertices.push({ x: parseFloat(x), y: parseFloat(y) });
        },
        glBegin: () => {
            if (inBegin) throw new Error("glBegin уже вызван");
            inBegin = true;
            vertices = [];
        },
        glEnd: () => {
            if (!inBegin) throw new Error("glEnd без glBegin");
            flushVertices();
            inBegin = false;
        }
    };

    // Простой парсер выражений
    function evaluate(expr, vars) {
        expr = expr.trim();
        // числа
        if (!isNaN(parseFloat(expr)) && isFinite(expr)) return parseFloat(expr);
        // переменные
        if (vars[expr] !== undefined) return vars[expr];
        // арифметика простейшая (только + - * /)
        let ops = ['+', '-', '*', '/'];
        for (let op of ops) {
            let parts = expr.split(op);
            if (parts.length === 2) {
                let left = evaluate(parts[0].trim(), vars);
                let right = evaluate(parts[1].trim(), vars);
                if (op === '+') return left + right;
                if (op === '-') return left - right;
                if (op === '*') return left * right;
                if (op === '/') return left / right;
            }
        }
        throw new Error(`Не удалось вычислить: ${expr}`);
    }

    // Основной интерпретатор
    function runCode(code) {
        clearCanvas();
        outputDiv.innerHTML = '';
        let vars = {};
        let lines = code.split('\n');
        let i = 0;

        function parseBlock(startIdx) {
            let blockLines = [];
            let j = startIdx;
            let braceCount = 0;
            let started = false;
            while (j < lines.length) {
                let line = lines[j].trim();
                if (line === '{') {
                    braceCount++;
                    started = true;
                    j++;
                    continue;
                }
                if (line === '}') {
                    braceCount--;
                    if (braceCount === 0 && started) {
                        j++;
                        break;
                    }
                    j++;
                    continue;
                }
                if (started || braceCount > 0) {
                    blockLines.push(lines[j]);
                }
                j++;
            }
            return { blockLines, newIndex: j };
        }

        while (i < lines.length) {
            let line = lines[i].trim();
            i++;

            if (line === '' || line.startsWith('//')) continue;

            try {
                // Объявление переменной: int x = 5; или float y = 3.14;
                let declMatch = line.match(/^(int|float)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+);$/);
                if (declMatch) {
                    let name = declMatch[2];
                    let value = evaluate(declMatch[3], vars);
                    vars[name] = value;
                    outputDiv.innerHTML += `> ${declMatch[1]} ${name} = ${value}<br>`;
                    continue;
                }

                // Присваивание: x = 10;
                let assignMatch = line.match(/^([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+);$/);
                if (assignMatch) {
                    let name = assignMatch[1];
                    let value = evaluate(assignMatch[2], vars);
                    vars[name] = value;
                    outputDiv.innerHTML += `> ${name} = ${value}<br>`;
                    continue;
                }

                // gl-функции: glColor3f(1,0,0);
                let glMatch = line.match(/^(gl[A-Z][a-zA-Z0-9]*)\((.*)\);$/);
                if (glMatch && glFunctions[glMatch[1]]) {
                    let funcName = glMatch[1];
                    let argsStr = glMatch[2];
                    let args = argsStr.split(',').map(a => evaluate(a.trim(), vars));
                    glFunctions[funcName](...args);
                    outputDiv.innerHTML += `> ${funcName}(${args.join(', ')})<br>`;
                    continue;
                }

                // glBegin() без параметров
                if (line === 'glBegin();') {
                    glFunctions.glBegin();
                    outputDiv.innerHTML += `> glBegin()<br>`;
                    continue;
                }

                // glEnd() без параметров
                if (line === 'glEnd();') {
                    glFunctions.glEnd();
                    outputDiv.innerHTML += `> glEnd()<br>`;
                    continue;
                }

                // Условный оператор if (условие) { ... }
                let ifMatch = line.match(/^if\s*\((.*)\)\s*{?$/);
                if (ifMatch) {
                    let condition = ifMatch[1];
                    let condResult = false;
                    // парсим условие вида a < b или a == b и т.д.
                    let opMatch = condition.match(/([a-zA-Z0-9_\.]+)\s*([<>=!]=?)\s*([a-zA-Z0-9_\.]+)/);
                    if (opMatch) {
                        let left = evaluate(opMatch[1], vars);
                        let right = evaluate(opMatch[3], vars);
                        let op = opMatch[2];
                        if (op === '<') condResult = left < right;
                        else if (op === '>') condResult = left > right;
                        else if (op === '<=') condResult = left <= right;
                        else if (op === '>=') condResult = left >= right;
                        else if (op === '==') condResult = left == right;
                        else if (op === '!=') condResult = left != right;
                    }
                    // если есть { на той же строке, ищем блок
                    if (line.includes('{') || (i < lines.length && lines[i].trim() === '{')) {
                        let block;
                        if (line.includes('{')) {
                            // блок уже начат, откатываем i на 1 назад, чтобы parseBlock взял эту строку
                            i--;
                            block = parseBlock(i);
                            i = block.newIndex;
                        } else {
                            i++; // пропускаем строку с {
                            block = parseBlock(i);
                            i = block.newIndex;
                        }
                        if (condResult) {
                            runCode(block.blockLines.join('\n'));
                        }
                    } else {
                        // однострочный if
                        let bodyLine = lines[i].trim();
                        i++;
                        if (condResult) {
                            let tempCode = bodyLine;
                            runCode(tempCode);
                        }
                    }
                    continue;
                }

                // Цикл for (int i = 0; i < 10; i = i + 1) { ... }
                let forMatch = line.match(/^for\s*\(\s*int\s+([a-zA-Z_]+)\s*=\s*([^;]+);\s*([^;]+);\s*([^)]+)\s*\)\s*{?$/);
                if (forMatch) {
                    let varName = forMatch[1];
                    let initVal = evaluate(forMatch[2], vars);
                    let condition = forMatch[3].trim();
                    let increment = forMatch[4].trim();
                    vars[varName] = initVal;

                    // парсим блок
                    let block;
                    if (line.includes('{')) {
                        i--;
                        block = parseBlock(i);
                        i = block.newIndex;
                    } else {
                        i++; // пропускаем строку с {
                        block = parseBlock(i);
                        i = block.newIndex;
                    }

                    // выполняем цикл
                    while (true) {
                        // проверка условия
                        let condResult = false;
                        let opMatch = condition.match(/([a-zA-Z0-9_\.]+)\s*([<>=!]=?)\s*([a-zA-Z0-9_\.]+)/);
                        if (opMatch) {
                            let left = evaluate(opMatch[1], vars);
                            let right = evaluate(opMatch[3], vars);
                            let op = opMatch[2];
                            if (op === '<') condResult = left < right;
                            else if (op === '>') condResult = left > right;
                            else if (op === '<=') condResult = left <= right;
                            else if (op === '>=') condResult = left >= right;
                            else if (op === '==') condResult = left == right;
                            else if (op === '!=') condResult = left != right;
                        }
                        if (!condResult) break;

                        // выполняем тело
                        runCode(block.blockLines.join('\n'));

                        // инкремент
                        let incMatch = increment.match(/([a-zA-Z_]+)\s*=\s*(.+)/);
                        if (incMatch) {
                            let incVar = incMatch[1];
                            let newVal = evaluate(incMatch[2], vars);
                            vars[incVar] = newVal;
                        }
                    }
                    continue;
                }

                // Если ничего не подошло
                if (line && !line.startsWith('//')) {
                    outputDiv.innerHTML += `<span style="color: #ff6b6b;">⚠️ Ошибка в строке ${i}: ${line}</span><br>`;
                }
            } catch(e) {
                outputDiv.innerHTML += `<span style="color: #ff6b6b;">⚠️ Ошибка в строке ${i}: ${e.message}</span><br>`;
            }
        }
    }

    document.getElementById('runBtn').addEventListener('click', () => {
        runCode(codeArea.value);
    });

    runCode(codeArea.value);
</script>
</body>
</html>
