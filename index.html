<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OpenGL Compiler - Рабочая версия</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #2d2d30;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', 'Consolas', monospace;
        }
        
        .ide-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        .toolbar {
            background: #2d2d30;
            padding: 10px 15px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid #3e3e42;
        }
        
        .toolbar button {
            background: #0e639c;
            border: none;
            color: white;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
        }
        
        .toolbar button:hover {
            background: #1177bb;
        }
        
        .toolbar .save-btn {
            background: #2b7a3e;
        }
        
        .status-bar {
            background: #007acc;
            color: white;
            padding: 4px 15px;
            font-size: 12px;
            font-family: monospace;
            display: flex;
            justify-content: space-between;
        }
        
        .main-content {
            display: flex;
            min-height: 550px;
        }
        
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #3e3e42;
        }
        
        .panel-header {
            background: #252526;
            padding: 8px 15px;
            color: #cccccc;
            font-size: 12px;
            font-weight: bold;
            border-bottom: 1px solid #3e3e42;
        }
        
        textarea {
            flex: 1;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            padding: 15px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            resize: none;
            outline: none;
            line-height: 1.5;
        }
        
        .output-panel {
            width: 350px;
            background: #1e1e1e;
            display: flex;
            flex-direction: column;
        }
        
        .output-area {
            flex: 1;
            background: #1e1e1e;
            color: #cccccc;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        
        .error-text { color: #f48771; }
        .success-text { color: #6a9955; }
        .info-text { color: #9cdcfe; }
        
        .animation-window {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2d2d30;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            z-index: 1000;
            border: 2px solid #4c6ef5;
            display: none;
        }
        
        .animation-window.show {
            display: block;
        }
        
        .window-titlebar {
            background: #3e3e42;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            cursor: move;
            border-radius: 10px 10px 0 0;
        }
        
        .window-title {
            color: white;
            font-family: monospace;
            font-weight: bold;
        }
        
        .window-close {
            background: #e81123;
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .window-content {
            padding: 20px;
            background: #0a0c12;
            border-radius: 0 0 12px 12px;
            text-align: center;
        }
        
        .animation-canvas {
            background: #0a0c12;
            border-radius: 8px;
            box-shadow: 0 0 0 2px #4c6ef5;
            width: 400px;
            height: 400px;
        }
        
        .window-controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .window-controls button {
            background: #4c6ef5;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 999;
            display: none;
        }
        
        .overlay.show {
            display: block;
        }
    </style>
</head>
<body>
<div class="ide-container">
    <div class="toolbar">
        <button id="compileBtn">▶ Компилировать и запустить (F5)</button>
        <button id="saveBtn" class="save-btn">💾 Сохранить HTML</button>
    </div>
    <div class="status-bar">
        <span>📁 OpenGL Project</span>
        <span id="statusText">Готов к компиляции</span>
    </div>
    <div class="main-content">
        <div class="editor-panel">
            <div class="panel-header">📝 Редактор кода (JavaScript)</div>
            <textarea id="code">// Шахматная доска
function drawBoard() {
    for (let y = 0; y < 8; y++) {
        for (let x = 0; x < 8; x++) {
            if ((x + y) % 2 == 0) {
                glColor3f(0.2, 0.2, 0.2);
            } else {
                glColor3f(0.9, 0.9, 0.9);
            }
            glBegin("GL_QUADS");
            glVertex3f(x * 50, y * 50, 0);
            glVertex3f(x * 50 + 50, y * 50, 0);
            glVertex3f(x * 50 + 50, y * 50 + 50, 0);
            glVertex3f(x * 50, y * 50 + 50, 0);
            glEnd();
        }
    }
}

// Рисование квадрата
function drawSquare(cx, cy, size, red, green, blue) {
    glColor3f(red, green, blue);
    glBegin("GL_QUADS");
    glVertex3f(cx, cy, 0);
    glVertex3f(cx + size, cy, 0);
    glVertex3f(cx + size, cy + size, 0);
    glVertex3f(cx, cy + size, 0);
    glEnd();
}

// Переменные анимации
let posX = 50;
let speed = 3;
let direction = 1;

// Основной цикл анимации
async function main() {
    while (true) {
        glClear();
        drawBoard();
        
        posX = posX + speed * direction;
        
        if (posX > 350) {
            posX = 350;
            direction = -1;
        }
        if (posX < 50) {
            posX = 50;
            direction = 1;
        }
        
        // Рисуем два квадрата
        drawSquare(posX - 45, 295, 30, 0.2, 0.4, 0.8);  // синий слева
        drawSquare(posX + 35, 295, 30, 0.2, 0.8, 0.2);  // зеленый справа
        
        await delay(30);
    }
}

// Запускаем
main();</textarea>
        </div>
        <div class="output-panel">
            <div class="panel-header">📟 Вывод</div>
            <div class="output-area" id="output">
                > Готов к работе<br>
                > Нажми F5 для запуска
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="animation-window" id="animationWindow">
    <div class="window-titlebar" id="windowTitlebar">
        <span class="window-title">🎮 OpenGL Анимация</span>
        <button class="window-close" id="windowCloseBtn">✕</button>
    </div>
    <div class="window-content">
        <canvas id="animationCanvas" width="400" height="400" class="animation-canvas"></canvas>
        <div class="window-controls">
            <button id="stopBtn">⏹ Остановить</button>
        </div>
    </div>
</div>

<script>
    // Получаем элементы
    const canvas = document.getElementById('animationCanvas');
    const ctx = canvas.getContext('2d');
    const outputDiv = document.getElementById('output');
    const statusSpan = document.getElementById('statusText');
    const codeArea = document.getElementById('code');
    
    // ========== OpenGL эмуляция ==========
    let currentColor = { r: 1, g: 1, b: 1 };
    let vertices = [];
    let currentMode = null;
    
    function rgbToStyle(r,g,b) { 
        return `rgb(${Math.floor(r*255)}, ${Math.floor(g*255)}, ${Math.floor(b*255)})`; 
    }
    
    function drawTriangles() {
        for (let i = 0; i <= vertices.length - 3; i += 3) {
            ctx.beginPath();
            ctx.moveTo(vertices[i].x, vertices[i].y);
            ctx.lineTo(vertices[i+1].x, vertices[i+1].y);
            ctx.lineTo(vertices[i+2].x, vertices[i+2].y);
            ctx.closePath();
            ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
            ctx.fill();
        }
    }
    
    function drawQuads() {
        for (let i = 0; i <= vertices.length - 4; i += 4) {
            ctx.beginPath();
            ctx.moveTo(vertices[i].x, vertices[i].y);
            ctx.lineTo(vertices[i+1].x, vertices[i+1].y);
            ctx.lineTo(vertices[i+2].x, vertices[i+2].y);
            ctx.lineTo(vertices[i+3].x, vertices[i+3].y);
            ctx.closePath();
            ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
            ctx.fill();
        }
    }
    
    function drawTriangleFan() {
        if (vertices.length < 2) return;
        let first = vertices[0];
        for (let i = 1; i < vertices.length - 1; i++) {
            ctx.beginPath();
            ctx.moveTo(first.x, first.y);
            ctx.lineTo(vertices[i].x, vertices[i].y);
            ctx.lineTo(vertices[i+1].x, vertices[i+1].y);
            ctx.closePath();
            ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
            ctx.fill();
        }
    }
    
    function flush() {
        if (vertices.length === 0) return;
        if (currentMode === 'GL_TRIANGLES') drawTriangles();
        else if (currentMode === 'GL_QUADS') drawQuads();
        else if (currentMode === 'GL_TRIANGLE_FAN') drawTriangleFan();
        vertices = [];
    }
    
    // Глобальные OpenGL функции
    window.glColor3f = (r,g,b) => { currentColor = { r, g, b }; };
    window.glVertex3f = (x,y,z) => { vertices.push({ x, y }); };
    window.glBegin = (mode) => { currentMode = mode; vertices = []; };
    window.glEnd = () => { flush(); currentMode = null; };
    window.glClear = () => { 
        ctx.fillStyle = '#0a0c12'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height); 
    };
    window.delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));
    
    // Функция для вывода
    function addOutput(msg, type = "info") {
        const colors = { error: "error-text", success: "success-text", info: "info-text" };
        outputDiv.innerHTML += `<div class="${colors[type]}">> ${escapeHtml(msg)}</div>`;
        outputDiv.scrollTop = outputDiv.scrollHeight;
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function clearOutput() {
        outputDiv.innerHTML = '';
    }
    
    // Запуск пользовательского кода через eval
    async function runUserCode() {
        const code = codeArea.value;
        
        clearOutput();
        addOutput("🚀 Запуск кода...", "info");
        
        try {
            // Создаем функцию через new Function (работает везде)
            const wrappedCode = `
                (async function() {
                    ${code}
                })();
            `;
            
            const asyncFunc = new Function(wrappedCode);
            await asyncFunc();
            
            addOutput("✅ Выполнение завершено", "success");
            statusSpan.innerText = "Выполнение завершено";
        } catch (err) {
            addOutput(`❌ Ошибка: ${err.message}`, "error");
            statusSpan.innerText = "Ошибка выполнения";
            console.error(err);
        }
    }
    
    // Компиляция и запуск
    async function compileAndRun() {
        document.getElementById('animationWindow').classList.add('show');
        document.getElementById('overlay').classList.add('show');
        statusSpan.innerText = "Запуск...";
        await runUserCode();
    }
    
    // Остановка
    function stopAnimation() {
        addOutput("⏹ Анимация остановлена (обновите страницу для полной остановки)", "info");
        statusSpan.innerText = "Остановлено";
        ctx.fillStyle = '#0a0c12';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    
    // Закрыть окно
    function closeWindow() {
        document.getElementById('animationWindow').classList.remove('show');
        document.getElementById('overlay').classList.remove('show');
        statusSpan.innerText = "Окно закрыто";
    }
    
    // Сохранить HTML
    function saveHTML() {
        const currentCode = codeArea.value;
        const html = `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>OpenGL Program</title>
<style>
    body { margin: 0; overflow: hidden; background: #0a0c12; }
    canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();
    
    let scale = Math.min(canvas.width, canvas.height) / 400;
    let offX = (canvas.width - 400 * scale) / 2;
    let offY = (canvas.height - 400 * scale) / 2;
    
    function tx(x) { return offX + x * scale; }
    function ty(y) { return offY + y * scale; }
    
    let color = {r:1,g:1,b:1};
    let verts = [];
    let mode = null;
    
    window.glColor3f = (r,g,b) => { color = {r,g,b}; };
    window.glVertex3f = (x,y,z) => { verts.push({x,y}); };
    window.glBegin = (m) => { mode = m; verts = []; };
    window.glEnd = () => {
        if(verts.length < 3) { verts = []; return; }
        ctx.fillStyle = \`rgb(\${color.r*255},\${color.g*255},\${color.b*255})\`;
        if(mode === 'GL_QUADS') {
            for(let i=0; i<verts.length-3; i+=4) {
                ctx.beginPath();
                ctx.moveTo(tx(verts[i].x), ty(verts[i].y));
                ctx.lineTo(tx(verts[i+1].x), ty(verts[i+1].y));
                ctx.lineTo(tx(verts[i+2].x), ty(verts[i+2].y));
                ctx.lineTo(tx(verts[i+3].x), ty(verts[i+3].y));
                ctx.fill();
            }
        } else if(mode === 'GL_TRIANGLE_FAN') {
            for(let i=1; i<verts.length-1; i++) {
                ctx.beginPath();
                ctx.moveTo(tx(verts[0].x), ty(verts[0].y));
                ctx.lineTo(tx(verts[i].x), ty(verts[i].y));
                ctx.lineTo(tx(verts[i+1].x), ty(verts[i+1].y));
                ctx.fill();
            }
        }
        verts = [];
    };
    window.glClear = () => {
        ctx.fillStyle = '#0a0c12';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        scale = Math.min(canvas.width, canvas.height) / 400;
        offX = (canvas.width - 400 * scale) / 2;
        offY = (canvas.height - 400 * scale) / 2;
    };
    window.delay = (ms) => new Promise(r => setTimeout(r, ms));
    
    // Пользовательский код
    ${currentCode.replace(/<\/script>/gi, '<\\/script>')}
<\/script>
</body>
</html>`;
        
        const blob = new Blob([html], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'opengl_program.html';
        a.click();
        URL.revokeObjectURL(url);
        addOutput("💾 Файл сохранен как opengl_program.html", "success");
    }
    
    // Вешаем обработчики
    document.getElementById('compileBtn').onclick = compileAndRun;
    document.getElementById('saveBtn').onclick = saveHTML;
    document.getElementById('windowCloseBtn').onclick = closeWindow;
    document.getElementById('stopBtn').onclick = stopAnimation;
    
    // F5
    document.addEventListener('keydown', (e) => {
        if (e.key === 'F5') {
            e.preventDefault();
            compileAndRun();
        }
    });
    
    // Перетаскивание окна
    let dragging = false, dragX, dragY;
    const titlebar = document.getElementById('windowTitlebar');
    const win = document.getElementById('animationWindow');
    titlebar.onmousedown = (e) => {
        dragging = true;
        dragX = e.clientX - win.offsetLeft;
        dragY = e.clientY - win.offsetTop;
        win.style.cursor = 'grabbing';
    };
    document.onmousemove = (e) => {
        if (dragging) {
            win.style.left = (e.clientX - dragX) + 'px';
            win.style.top = (e.clientY - dragY) + 'px';
            win.style.transform = 'none';
        }
    };
    document.onmouseup = () => {
        dragging = false;
        win.style.cursor = '';
    };
    
    addOutput("✅ OpenGL эмулятор готов", "success");
    addOutput("📝 Нажми F5 для запуска кода", "info");
    addOutput("💡 Квадраты движутся, круга нет - убрал как ты просил", "info");
</script>
</body>
</html>
