            <textarea id="code">// Шахматная доска
void drawBoard() {
    int x;
    int y;
    for (y = 0; y < 8; y = y + 1) {
        for (x = 0; x < 8; x = x + 1) {
            if ((x + y) % 2 == 0) {
                glColor3f(0.2, 0.2, 0.2);
            } else {
                glColor3f(0.9, 0.9, 0.9);
            }
            glBegin(GL_QUADS);
                glVertex3f(x * 50.0, y * 50.0, 0.0);
                glVertex3f(x * 50.0 + 50.0, y * 50.0, 0.0);
                glVertex3f(x * 50.0 + 50.0, y * 50.0 + 50.0, 0.0);
                glVertex3f(x * 50.0, y * 50.0 + 50.0, 0.0);
            glEnd();
        }
    }
}

// Рисование круга
void drawCircle(float cx, float cy, float r, float red, float green, float blue) {
    glColor3f(red, green, blue);
    glBegin(GL_TRIANGLE_FAN);
        glVertex3f(cx, cy, 0.0);
        int i;
        for (i = 0; i <= 36; i = i + 1) {
            float angle = i * 10.0 * 3.14159 / 180.0;
            glVertex3f(cx + r * cos(angle), cy + r * sin(angle), 0.0);
        }
    glEnd();
}

// Рисование квадрата
void drawSquare(float cx, float cy, float size, float red, float green, float blue) {
    glColor3f(red, green, blue);
    glBegin(GL_QUADS);
        glVertex3f(cx, cy, 0.0);
        glVertex3f(cx + size, cy, 0.0);
        glVertex3f(cx + size, cy + size, 0.0);
        glVertex3f(cx, cy + size, 0.0);
    glEnd();
}

// Переменные
float posX;
float speed;
int direction;

posX = 50.0;
speed = 3.0;
direction = 1;

// Список кругов
int circlesCount;
float circlesX[100];
float circlesY[100];
int circlesR[100];
circlesCount = 0;

// Функция при нажатии
void onTap(float x, float y) {
    circlesX[circlesCount] = x;
    circlesY[circlesCount] = y;
    circlesR[circlesCount] = 15;
    circlesCount = circlesCount + 1;
}

// Анимация
while (1) {
    glClear();
    drawBoard();
    
    posX = posX + speed * direction;
    
    if (posX > 350.0) {
        posX = 350.0;
        direction = -1;
    }
    if (posX < 50.0) {
        posX = 50.0;
        direction = 1;
    }
    
    drawSquare(posX - 45.0, 295.0, 30.0, 0.2, 0.4, 0.8);
    drawSquare(posX + 35.0, 295.0, 30.0, 0.2, 0.8, 0.2);
    
    // Рисуем все сохраненные круги
    int i;
    for (i = 0; i < circlesCount; i = i + 1) {
        drawCircle(circlesX[i], circlesY[i], circlesR[i], 1.0, 1.0, 0.0);
    }
    
    delay(30);
}</textarea>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const output = document.getElementById('output');
    const statusSpan = document.getElementById('statusText');
    const codeArea = document.getElementById('code');
    const coordsText = document.getElementById('coordsText');
    
    // OpenGL эмуляция
    let color = { r: 1, g: 1, b: 1 };
    let verts = [];
    let mode = null;
    
    function drawQuads() {
        for (let i = 0; i <= verts.length - 4; i += 4) {
            ctx.beginPath();
            ctx.moveTo(verts[i].x, verts[i].y);
            ctx.lineTo(verts[i+1].x, verts[i+1].y);
            ctx.lineTo(verts[i+2].x, verts[i+2].y);
            ctx.lineTo(verts[i+3].x, verts[i+3].y);
            ctx.fillStyle = `rgb(${color.r*255},${color.g*255},${color.b*255})`;
            ctx.fill();
        }
    }
    
    function drawTriangleFan() {
        if (verts.length < 2) return;
        let first = verts[0];
        for (let i = 1; i < verts.length - 1; i++) {
            ctx.beginPath();
            ctx.moveTo(first.x, first.y);
            ctx.lineTo(verts[i].x, verts[i].y);
            ctx.lineTo(verts[i+1].x, verts[i+1].y);
            ctx.fillStyle = `rgb(${color.r*255},${color.g*255},${color.b*255})`;
            ctx.fill();
        }
    }
    
    function flush() {
        if (verts.length === 0) return;
        if (mode === 'GL_QUADS') drawQuads();
        else if (mode === 'GL_TRIANGLE_FAN') drawTriangleFan();
        verts = [];
    }
    
    window.glColor3f = (r,g,b) => { color = { r, g, b }; };
    window.glVertex3f = (x,y,z) => { verts.push({ x, y }); };
    window.glBegin = (m) => { mode = m; verts = []; };
    window.glEnd = () => { flush(); mode = null; };
    window.glClear = () => {
        ctx.fillStyle = '#0a0c12';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    };
    window.delay = (ms) => new Promise(r => setTimeout(r, ms));
    window.cos = Math.cos;
    window.sin = Math.sin;
    window.M_PI = Math.PI;
    
    // ========== КОНВЕРТЕР C → JAVASCRIPT ==========
    function convertCtoJS(code) {
        let js = code;
        
        // Удаляем комментарии (сохраняем // и /* */)
        // но оставляем // в строках? упрощенно
        
        // Заменяем типы переменных в объявлениях
        // int x; -> let x;
        js = js.replace(/\bint\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*;/g, 'let $1;');
        js = js.replace(/\bint\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*([^;]+);/g, 'let $1 = $2;');
        js = js.replace(/\bfloat\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*;/g, 'let $1;');
        js = js.replace(/\bfloat\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*([^;]+);/g, 'let $1 = $2;');
        
        // Массивы: float name[100]; -> let name = new Array(100);
        js = js.replace(/\b(float|int)\s+([a-zA-Z_][a-zA-Z0-9_]*)\[(\d+)\]\s*;/g, 'let $2 = new Array($3);');
        
        // void function() { -> function function() {
        js = js.replace(/\bvoid\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*\(/g, 'function $1(');
        
        // for (int i = 0; i < n; i = i + 1) -> for (let i = 0; i < n; i++)
        js = js.replace(/for\s*\(\s*int\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*([^;]+);\s*([^;]+);\s*([^)]+)\)/g, 
            'for (let $1 = $2; $3; $4)');
        
        // for (int i = 0; i < n; i++) -> for (let i = 0; i < n; i++)
        js = js.replace(/for\s*\(\s*int\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*([^;]+);\s*([^;]+);\s*([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*\4\s*\+\s*1\)/g,
            'for (let $1 = $2; $3; $1++)');
        
        // while (1) -> while (true)
        js = js.replace(/while\s*\(\s*1\s*\)/g, 'while (true)');
        js = js.replace(/while\s*\(\s*true\s*\)/g, 'while (true)');
        
        // Заменяем объявления переменных в for
        js = js.replace(/for\s*\(\s*([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*([^;]+);/g, 'for (let $1 = $2;');
        
        // Убираем точки с запятой после } (не критично)
        
        // Заменяем операторы сравнения
        js = js.replace(/==\s*=/g, '===');
        js = js.replace(/!=\s*=/g, '!==');
        
        // Добавляем await перед delay если нужно
        js = js.replace(/delay\(/g, 'await delay(');
        
        // Делаем функцию main асинхронной если есть while
        if (js.includes('while (true)') || js.includes('while(1)')) {
            js = 'async function __main() {\n' + js + '\n}\n__main();';
        }
        
        return js;
    }
    
    // ========== ЗАПУСК ==========
    let isRunning = false;
    
    function addOutput(msg, type = 'info') {
        const cls = type === 'error' ? 'error-text' : (type === 'success' ? 'success-text' : 'info-text');
        output.innerHTML += `<div class="${cls}">> ${msg}</div>`;
        output.scrollTop = output.scrollHeight;
        if (output.children.length > 100) {
            output.removeChild(output.children[0]);
        }
    }
    
    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let cx, cy;
        if (e.touches) {
            cx = e.touches[0].clientX;
            cy = e.touches[0].clientY;
        } else {
            cx = e.clientX;
            cy = e.clientY;
        }
        let x = (cx - rect.left) * scaleX;
        let y = (cy - rect.top) * scaleY;
        x = Math.max(0, Math.min(canvas.width, x));
        y = Math.max(0, Math.min(canvas.height, y));
        return { x: Math.floor(x), y: Math.floor(y) };
    }
    
    function onCanvasClick(e) {
        e.preventDefault();
        const c = getCoords(e);
        coordsText.innerHTML = `👆 X=${c.x}, Y=${c.y}`;
        
        if (typeof window.onTap === 'function') {
            try {
                window.onTap(c.x, c.y);
            } catch(err) {
                addOutput(`Ошибка в onTap: ${err.message}`, 'error');
            }
        }
    }
    
    canvas.addEventListener('click', onCanvasClick);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onCanvasClick(e); });
    
    async function compileAndRun() {
        const cCode = codeArea.value;
        
        output.innerHTML = '';
        addOutput('🔨 Компиляция C-кода...', 'info');
        statusSpan.innerText = 'Компиляция...';
        
        try {
            // Конвертируем C в JavaScript
            let jsCode = convertCtoJS(cCode);
            
            addOutput('✅ Конвертация успешна', 'success');
            addOutput('📝 Сгенерированный JavaScript:', 'info');
            addOutput(jsCode.substring(0, 500) + (jsCode.length > 500 ? '...' : ''), 'info');
            
            // Останавливаем старую анимацию
            if (window.running) {
                window.running = false;
                await new Promise(r => setTimeout(r, 200));
            }
            
            // Очищаем глобальные переменные
            window.running = true;
            if (typeof window.circles !== 'undefined') {
                // сохраняем массив если есть
            }
            
            // Выполняем сконвертированный код
            const func = new Function(`
                window.running = true;
                ${jsCode}
            `);
            
            func();
            
            addOutput('✅ Программа запущена!', 'success');
            statusSpan.innerText = 'Работает';
            
            document.getElementById('animationWindow').classList.add('show');
            document.getElementById('overlay').classList.add('show');
            
        } catch(err) {
            addOutput(`❌ Ошибка компиляции: ${err.message}`, 'error');
            statusSpan.innerText = 'Ошибка';
            console.error(err);
        }
    }
    
    function stopAnimation() {
        if (window.running) {
            window.running = false;
            addOutput('⏹ Анимация остановлена', 'info');
            statusSpan.innerText = 'Остановлено';
        }
        ctx.fillStyle = '#0a0c12';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    
    function clearCircles() {
        if (typeof window.circlesCount !== 'undefined') {
            window.circlesCount = 0;
            addOutput('🗑 Все круги очищены', 'info');
        }
        if (typeof window.circles !== 'undefined') {
            window.circles = [];
        }
    }
    
    function closeWindow() {
        if (window.running) {
            window.running = false;
        }
        document.getElementById('animationWindow').classList.remove('show');
        document.getElementById('overlay').classList.remove('show');
        statusSpan.innerText = 'Окно закрыто';
        addOutput('❌ Окно закрыто', 'info');
        ctx.fillStyle = '#0a0c12';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    
    function saveHTML() {
        const currentCode = codeArea.value;
        const html = `<!DOCTYPE html>
<html>

<body>

let offY=(canvas.height-400*scale)/2;
function tx(x){return offX+x*scale;}
function ty(y){return offY+y*scale;}

let mode=null;
function drawQuads(){
    for(let i=0;i<=verts.length-4;i+=4){
        ctx.beginPath();
        ctx.moveTo(tx(verts[i].x),ty(verts[i].y));
        ctx.lineTo(tx(verts[i+1].x),ty(verts[i+1].y));
        ctx.lineTo(tx(verts[i+2].x),ty(verts[i+2].y));
        ctx.lineTo(tx(verts[i+3].x),ty(verts[i+3].y));

window.glColor3f=(r,g,b)=>{color={r,g,b};};

};

function getCoords(e){

    else{cx=e.clientX;cy=e.clientY;}

    let y=(cy-rect.top)*sy;
    x=Math.max(0,Math.min(canvas.width,x));
    y=Math.max(0,Math.min(canvas.height,y));

}

canvas.onclick=(e)=>{
    const c=getCoords(e);
    if(typeof onTap==='function')onTap(c.x,c.y);
};
canvas.ontouchstart=(e)=>{e.preventDefault();canvas.onclick(e);};

let running=true;

${convertCtoJS(currentCode).replace(/<\/script>/gi, '<\\/script>')}
<\/script>
</body>
</html>`;
        
        const blob = new Blob([html], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'c_opengl_program.html';
        a.click();
        URL.revokeObjectURL(blob);
        addOutput('💾 Файл сохранен', 'success');
    }
    
    document.getElementById('compileBtn').onclick = compileAndRun;
    document.getElementById('saveBtn').onclick = saveHTML;
    document.getElementById('closeBtn').onclick = closeWindow;
    document.getElementById('stopBtn').onclick = stopAnimation;
    document.getElementById('clearBtn').onclick = clearCircles;
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'F5') {
            e.preventDefault();
            compileAndRun();
        }
    });
    
    let drag = false, dx, dy;
    const win = document.getElementById('animationWindow');
    const title = document.getElementById('titlebar');
    title.onmousedown = (e) => {
        drag = true;
        dx = e.clientX - win.offsetLeft;
        dy = e.clientY - win.offsetTop;
    };
    document.onmousemove = (e) => {
        if (drag) {
            win.style.left = (e.clientX - dx) + 'px';
            win.style.top = (e.clientY - dy) + 'px';
            win.style.transform = 'none';
        }
    };
    document.onmouseup = () => { drag = false; };
