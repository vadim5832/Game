<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OpenGL 1.3 C-Style Graphics</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #1a1e2c; margin: 0; padding: 20px; font-family: monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { max-width: 1200px; width: 100%; background: #0f1219; border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .row { display: flex; gap: 20px; flex-wrap: wrap; }
        .editor-panel { flex: 2; min-width: 300px; }
        .canvas-panel { flex: 1; min-width: 400px; text-align: center; }
        textarea { width: 100%; height: 450px; background: #0a0c12; color: #4c6ef5; border: 1px solid #2a2f3f; border-radius: 12px; padding: 12px; font-family: monospace; font-size: 13px; resize: vertical; }
        canvas { background: #0a0c12; border-radius: 12px; box-shadow: 0 0 0 2px #2a2f3f; width: 100%; height: auto; cursor: crosshair; }
        button { background: #4c6ef5; border: none; color: white; font-size: 18px; font-weight: bold; padding: 10px 25px; border-radius: 40px; margin-top: 15px; cursor: pointer; width: 100%; }
        button:active { transform: scale(0.97); background: #3b5bdb; }
        .output { background: #0a0c12; color: #a0a4b8; border-radius: 12px; padding: 10px; margin-top: 15px; font-family: monospace; font-size: 12px; max-height: 100px; overflow-y: auto; text-align: left; }
        .copy-btn { background: #2a2f3f; margin-top: 8px; font-size: 14px; padding: 6px 12px; width: auto; }
        .error-line { color: #ff6b6b; white-space: pre-wrap; }
        .status { color: #a0a4b8; margin-top: 10px; font-size: 12px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="row">
        <div class="editor-panel">
            <textarea id="code">// OpenGL 1.3 C-стиль
int i;
glColor3f(1.0, 0.2, 0.5);
glBegin(GL_TRIANGLES);
for (i = 0; i < 10; i = i + 1) {
    float x = i * 40.0;
    float y = 200.0;
    glVertex3f(x, y, 0.0);
    glVertex3f(x + 30.0, y, 0.0);
    glVertex3f(x + 15.0, y + 30.0, 0.0);
}
glEnd();

glColor3f(0.2, 0.8, 0.3);
glBegin(GL_QUADS);
    glVertex3f(50.0, 50.0, 0.0);
    glVertex3f(150.0, 50.0, 0.0);
    glVertex3f(150.0, 150.0, 0.0);
    glVertex3f(50.0, 150.0, 0.0);
glEnd();

glColor3f(1.0, 0.8, 0.0);
glBegin(GL_TRIANGLE_FAN);
    glVertex3f(300.0, 300.0, 0.0);
    glVertex3f(350.0, 250.0, 0.0);
    glVertex3f(380.0, 280.0, 0.0);
    glVertex3f(380.0, 320.0, 0.0);
    glVertex3f(350.0, 350.0, 0.0);
    glVertex3f(300.0, 350.0, 0.0);
glEnd();</textarea>
        </div>
        <div class="canvas-panel">
            <canvas id="canvas" width="400" height="400"></canvas>
            <button id="runBtn">▶ Запустить код</button>
            <div class="output" id="output">Нажмите "Запустить"</div>
            <button id="copyErrorsBtn" class="copy-btn">📋 Копировать ошибки</button>
        </div>
    </div>
    <div class="status">C-синтаксис: int, float, for, if, while. OpenGL: glColor3f, glVertex3f, glBegin(тип), glEnd(). Типы: GL_TRIANGLES, GL_QUADS, GL_TRIANGLE_FAN, GL_TRIANGLE_STRIP</div>
</div>

<script>
    let tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const codeArea = document.getElementById('code');
    const outputDiv = document.getElementById('output');
    const copyErrorsBtn = document.getElementById('copyErrorsBtn');
    let errors = [];

    function clearOutput() { outputDiv.innerHTML = ''; errors = []; }
    function addError(msg) { errors.push(msg); outputDiv.innerHTML += `<div class="error-line">⚠️ ${escapeHtml(msg)}</div>`; }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

    // OpenGL состояния
    let currentColor = { r: 1, g: 1, b: 1 };
    let vertices = [];
    let currentMode = null;
    let inBegin = false;

    function rgbToStyle(r,g,b) { return `rgb(${Math.floor(r*255)}, ${Math.floor(g*255)}, ${Math.floor(b*255)})`; }

    function drawTriangles() {
        if (vertices.length < 3) return;
        for (let i = 0; i <= vertices.length - 3; i += 3) {
            ctx.beginPath();
            ctx.moveTo(vertices[i].x, vertices[i].y);
            ctx.lineTo(vertices[i+1].x, vertices[i+1].y);
            ctx.lineTo(vertices[i+2].x, vertices[i+2].y);
            ctx.closePath();
            ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
            ctx.fill();
        }
    }

    function drawQuads() {
        if (vertices.length < 4) return;
        for (let i = 0; i <= vertices.length - 4; i += 4) {
            ctx.beginPath();
            ctx.moveTo(vertices[i].x, vertices[i].y);
            ctx.lineTo(vertices[i+1].x, vertices[i+1].y);
            ctx.lineTo(vertices[i+2].x, vertices[i+2].y);
            ctx.lineTo(vertices[i+3].x, vertices[i+3].y);
            ctx.closePath();
            ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
            ctx.fill();
        }
    }

    function drawTriangleFan() {
        if (vertices.length < 3) return;
        let first = vertices[0];
        for (let i = 1; i < vertices.length - 1; i++) {
            ctx.beginPath();
            ctx.moveTo(first.x, first.y);
            ctx.lineTo(vertices[i].x, vertices[i].y);
            ctx.lineTo(vertices[i+1].x, vertices[i+1].y);
            ctx.closePath();
            ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
            ctx.fill();
        }
    }

    function drawTriangleStrip() {
        if (vertices.length < 3) return;
        for (let i = 0; i < vertices.length - 2; i++) {
            ctx.beginPath();
            ctx.moveTo(vertices[i].x, vertices[i].y);
            ctx.lineTo(vertices[i+1].x, vertices[i+1].y);
            ctx.lineTo(vertices[i+2].x, vertices[i+2].y);
            ctx.closePath();
            ctx.fillStyle = rgbToStyle(currentColor.r, currentColor.g, currentColor.b);
            ctx.fill();
        }
    }

    function flush() {
        if (vertices.length === 0) return;
        switch(currentMode) {
            case 'GL_TRIANGLES': drawTriangles(); break;
            case 'GL_QUADS': drawQuads(); break;
            case 'GL_TRIANGLE_FAN': drawTriangleFan(); break;
            case 'GL_TRIANGLE_STRIP': drawTriangleStrip(); break;
            default: break;
        }
        vertices = [];
    }

    const gl = {
        glColor3f: (r,g,b) => { currentColor = { r, g, b }; },
        glVertex3f: (x,y,z) => { if (!inBegin) throw new Error("glVertex3f вне glBegin/glEnd"); vertices.push({ x, y }); },
        glBegin: (mode) => { 
            if (inBegin) throw new Error("glBegin уже вызван");
            inBegin = true; 
            currentMode = mode;
            vertices = [];
        },
        glEnd: () => { 
            if (!inBegin) throw new Error("glEnd без glBegin");
            flush();
            inBegin = false;
            currentMode = null;
        },
        glClearColor: (r,g,b,a) => {},
        glClear: (mask) => { ctx.fillStyle = '#0a0c12'; ctx.fillRect(0,0,canvas.width,canvas.height); }
    };

    function runCode(code) {
        clearOutput();
        ctx.fillStyle = '#0a0c12';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        currentColor = { r:1,g:1,b:1 };
        vertices = [];
        inBegin = false;
        currentMode = null;

        // Преобразуем C-синтаксис в JS
        let jsCode = code
            // Объявления переменных
            .replace(/\bint\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*([^;]+);/g, 'let $1 = $2;')
            .replace(/\bfloat\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*([^;]+);/g, 'let $1 = $2;')
            // Циклы for
            .replace(/for\s*\(\s*([a-zA-Z_][a-zA-Z0-9_]*)\s*=/g, 'for (let $1 =')
            // Преобразуем константы GL_
            .replace(/\bGL_TRIANGLES\b/g, '"GL_TRIANGLES"')
            .replace(/\bGL_QUADS\b/g, '"GL_QUADS"')
            .replace(/\bGL_TRIANGLE_FAN\b/g, '"GL_TRIANGLE_FAN"')
            .replace(/\bGL_TRIANGLE_STRIP\b/g, '"GL_TRIANGLE_STRIP"')
            // Вызовы функций
            .replace(/\b(glColor3f|glVertex3f|glBegin|glEnd|glClearColor|glClear)\s*\(/g, 'gl.$1(');

        try {
            const func = new Function('gl', jsCode);
            func(gl);
        } catch(e) {
            addError(e.message);
        }
    }

    document.getElementById('runBtn').addEventListener('click', () => runCode(codeArea.value));
    copyErrorsBtn.addEventListener('click', () => {
        if (errors.length === 0) alert('Нет ошибок');
        else navigator.clipboard.writeText(errors.join('\n')).then(() => alert(`Скопировано ${errors.length} ошибок`));
    });
    runCode(codeArea.value);
</script>
</body>
</html>
