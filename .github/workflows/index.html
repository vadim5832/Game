<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake Game</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a1e2c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .game-container {
            text-align: center;
            background: #0f1219;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas {
            background: #0a0c12;
            border-radius: 12px;
            box-shadow: 0 0 0 2px #2a2f3f;
            display: block;
            margin: 0 auto;
        }
        .score {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        .score span {
            background: #2a2f3f;
            padding: 5px 15px;
            border-radius: 30px;
        }
        button {
            background: #4c6ef5;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 40px;
            margin-top: 15px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        button:active {
            transform: scale(0.97);
            background: #3b5bdb;
        }
        .status {
            color: #a0a4b8;
            margin-top: 10px;
            font-size: 14px;
        }
        @media (max-width: 500px) {
            .score { font-size: 20px; }
            button { padding: 8px 20px; font-size: 16px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="score">
            <span>🍎 Счёт: <span id="score">0</span></span>
            <span>🏆 Рекорд: <span id="highScore">0</span></span>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <button id="restartBtn">🔄 Новая игра</button>
        <div class="status">⬆️⬇️⬅️➡️ или свайпы</div>
    </div>
</div>

<script>
    // ---------- Инициализация Telegram WebApp ----------
    let tg = null;
    try {
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand(); // разворачиваем на весь экран
            tg.enableClosingConfirmation(); // подтверждение при закрытии
        }
    } catch(e) { console.log("Not in Telegram"); }

    // ---------- Игра Змейка ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const highScoreElement = document.getElementById('highScore');

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake = [{x: 10, y: 10}];
    let direction = {x: 0, y: 0};
    let food = {};
    let score = 0;
    let highScore = localStorage.getItem('snakeHighScore') || 0;
    let gameLoop = null;
    let gameRunning = true;

    highScoreElement.textContent = highScore;

    // Случайная еда
    function randomFood() {
        food = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
        };
        // Проверка, чтобы еда не появилась на змее
        for (let segment of snake) {
            if (segment.x === food.x && segment.y === food.y) {
                randomFood();
                break;
            }
        }
    }

    // Отрисовка
    function draw() {
        // Фон
        ctx.fillStyle = '#0a0c12';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Змея
        ctx.fillStyle = '#4c6ef5';
        for (let i = 0; i < snake.length; i++) {
            ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 1, gridSize - 1);
            // Глазки у головы
            if (i === 0) {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(snake[i].x * gridSize + 5, snake[i].y * gridSize + 5, 3, 3);
                ctx.fillRect(snake[i].x * gridSize + 12, snake[i].y * gridSize + 5, 3, 3);
                ctx.fillStyle = '#4c6ef5';
            }
        }
        
        // Еда
        ctx.fillStyle = '#ff6b6b';
        ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 1, gridSize - 1);
        
        // Сетка (опционально)
        ctx.strokeStyle = '#1e2436';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= tileCount; i++) {
            ctx.beginPath();
            ctx.moveTo(i * gridSize, 0);
            ctx.lineTo(i * gridSize, canvas.height);
            ctx.stroke();
            ctx.moveTo(0, i * gridSize);
            ctx.lineTo(canvas.width, i * gridSize);
            ctx.stroke();
        }
    }

    // Обновление логики
    function update() {
        if (!gameRunning) return;
        
        const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};
        
        // Столкновение со стенами
        if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
            gameOver();
            return;
        }
        
        // Столкновение с собой
        for (let segment of snake) {
            if (head.x === segment.x && head.y === segment.y) {
                gameOver();
                return;
            }
        }
        
        snake.unshift(head);
        
        // Съела ли еду?
        if (head.x === food.x && head.y === food.y) {
            score++;
            scoreElement.textContent = score;
            if (score > highScore) {
                highScore = score;
                highScoreElement.textContent = highScore;
                localStorage.setItem('snakeHighScore', highScore);
                
                // Отправляем рекорд в Telegram (опционально)
                if (tg && score > 0) {
                    tg.sendData(JSON.stringify({ type: 'new_record', score: score }));
                }
            }
            randomFood();
        } else {
            snake.pop();
        }
    }
    
    function gameOver() {
        gameRunning = false;
        if (gameLoop) clearInterval(gameLoop);
        
        // Показываем попап через Telegram
        if (tg) {
            tg.showAlert(`Игра окончена! Ваш счёт: ${score}`);
            tg.HapticFeedback.notificationOccurred('error');
        } else {
            alert(`Игра окончена! Счёт: ${score}`);
        }
        
        // Останавливаем игру, показываем кнопку рестарта
    }
    
    function restartGame() {
        snake = [{x: 10, y: 10}];
        direction = {x: 0, y: 0};
        score = 0;
        scoreElement.textContent = score;
        gameRunning = true;
        randomFood();
        if (gameLoop) clearInterval(gameLoop);
        gameLoop = setInterval(() => {
            update();
            draw();
        }, 100);
    }
    
    // Управление с клавиатуры
    document.addEventListener('keydown', (e) => {
        if (!gameRunning) return;
        switch(e.key) {
            case 'ArrowUp': if (direction.y === 0) direction = {x: 0, y: -1}; break;
            case 'ArrowDown': if (direction.y === 0) direction = {x: 0, y: 1}; break;
            case 'ArrowLeft': if (direction.x === 0) direction = {x: -1, y: 0}; break;
            case 'ArrowRight': if (direction.x === 0) direction = {x: 1, y: 0}; break;
        }
    });
    
    // Поддержка свайпов для мобильных
    let touchStart = null;
    canvas.addEventListener('touchstart', (e) => {
        const rect = canvas.getBoundingClientRect();
        touchStart = {
            x: e.touches[0].clientX - rect.left,
            y: e.touches[0].clientY - rect.top
        };
    });
    canvas.addEventListener('touchend', (e) => {
        if (!touchStart || !gameRunning) return;
        const rect = canvas.getBoundingClientRect();
        const touchEnd = {
            x: e.changedTouches[0].clientX - rect.left,
            y: e.changedTouches[0].clientY - rect.top
        };
        const dx = touchEnd.x - touchStart.x;
        const dy = touchEnd.y - touchStart.y;
        if (Math.abs(dx) > Math.abs(dy)) {
            if (dx > 30 && direction.x === 0) direction = {x: 1, y: 0};
            else if (dx < -30 && direction.x === 0) direction = {x: -1, y: 0};
        } else {
            if (dy > 30 && direction.y === 0) direction = {x: 0, y: 1};
            else if (dy < -30 && direction.y === 0) direction = {x: 0, y: -1};
        }
        touchStart = null;
    });
    
    // Кнопка рестарта
    document.getElementById('restartBtn').addEventListener('click', () => {
        restartGame();
    });
    
    // Запуск игры
    randomFood();
    gameLoop = setInterval(() => {
        update();
        draw();
    }, 100);
    
    // Отправляем в Telegram, что игра готова
    if (tg) {
        tg.ready();
        tg.MainButton.setText("Играть");
        tg.MainButton.show();
    }
</script>
</body>
  </html>
